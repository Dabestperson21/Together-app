others find that awareness of bias is necessary but not sufficient — structural constraints on biased behaviour are needed for real change."},{"t":"What is the relationship between pay transparency and workplace inequality?","o":["Pay transparency reduces the information asymmetry that allows employers to pay marginalised workers less by making pay comparable and creating accountability for disparities","Pay transparency violates privacy","Pay differences are always justified","Transparency causes conflict without producing fairness"],"e":"Research shows pay transparency reduces gender and racial pay gaps by making discrimination visible and harder to sustain."},{"t":"What is the political economy of workplace flexibility and how does it relate to inequality?","o":["Workplace flexibility is distributed unequally with higher-status workers having more control over their time while lower-paid workers have rigid schedules — this tracks race and gender producing compounding disadvantage","Flexible work is available equally to everyone","Flexibility is a simple employee perk","Workplace scheduling is always fair"],"e":"Who gets flexibility and who does not reflects existing power hierarchies in organisations and the labour market."}],"t5":[{"t":"How does the concept of cultural fit perpetuate workplace homogeneity?","o":["Cultural fit is often a proxy for similarity to existing team members which screens out those who are different in terms of race gender or background regardless of competence","Cultural fit is a valid hiring criterion","Cultural fit is always about values not demographics","Cultural fit assessment is always objective"],"e":"Lauren Rivera's research shows that elite employers use cultural fit as a primary hiring criterion in ways that reproduce class race and gender homogeneity."},{"t":"What is the political economy of unpaid internships in relation to inequality?","o":["Unpaid internships restrict access to prestigious career pathways to those with financial means effectively barring those from low-income backgrounds who disproportionately include people of colour and first-generation students","Unpaid internships provide equal opportunity","Unpaid internships are a neutral entry-level experience","Anyone can afford an unpaid internship"],"e":"Unpaid internships convert economic privilege into career advantage compounding existing inequalities across race and class lines."},{"t":"What is the argument that diversity and inclusion must be integrated into core business strategy?","o":["Because isolated HR initiatives cannot change the power structures resource allocation and strategic priorities that determine who succeeds in an organisation","Because HR is not important","Because diversity is only about branding","Because HR always fails"],"e":"Research on diversity initiatives shows that structural integration — changing how talent is evaluated and deployed — produces more lasting change than standalone programmes."},{"t":"What is shareholder primacy and how does it relate to workplace inequality?","o":["When maximising short-term shareholder returns is the dominant goal investment in employee wellbeing pay equity and inclusion is treated as a cost to be minimised rather than a strategic priority","Shareholder primacy promotes fairness","Investor priorities have no effect on workplace culture","All companies balance shareholder and employee interests"],"e":"The financialisation of corporations has been linked to wage stagnation increased precarity and underinvestment in workforce development particularly affecting already marginalised workers."},{"t":"What is the argument for reparative hiring and promotion policies in organisations with documented histories of discrimination?","o":["When past discrimination has produced compositional inequality simply removing barriers is insufficient because existing structures encode and reproduce the effects of past exclusion","Removing barriers is always sufficient","Past discrimination is irrelevant to current hiring","All preferential policies are inherently unfair"],"e":"Scholars argue that colour-blindness in organisations with racially unequal compositions is not neutral but perpetuates existing hierarchy."},{"t":"What is worker misclassification and how does it relate to labour market inequality?","o":["Classifying workers as independent contractors rather than employees denies them benefits protections and bargaining power — this disproportionately affects marginalised workers in low-wage and gig work","Misclassification is always an innocent mistake","All gig workers prefer contractor status","Misclassification has no relation to inequality"],"e":"Gig economy misclassification transfers risk from employers to workers and disproportionately harms workers of colour and immigrants."},{"t":"What is the psychological contract in the context of workplace inclusion?","o":["When marginalised employees experience repeated violations of implicit promises of fairness and belonging through microaggressions unequal evaluation and lack of sponsorship they experience a breach that drives disengagement and attrition","Psychological contracts are only about pay","Psychological contracts are always explicit","Marginalised employees have the same psychological contracts as others"],"e":"The unmet promises of inclusion that organisations make to diverse employees and consistently fail to keep are a primary driver of attrition among underrepresented groups."},{"t":"What is the structural argument for why some organisations have more equitable outcomes despite similar diversity numbers?","o":["Equitable outcomes correlate with structural factors including fair evaluation criteria transparent pay accountability for bias sponsorship programmes and senior leadership commitment — not just diversity headcount","Diversity numbers are the primary predictor of equity","Organisation size explains equity differences","Equitable outcomes are random"],"e":"Research identifies specific structural practices that predict equitable outcomes beyond mere representation numbers."}]},"mind":{"t1":[{"t":"What is an unconscious bias?","o":["A bias you hold without being aware of it","A bias you choose to have","A type of opinion","A deliberate prejudice"],"e":"Unconscious bias operates below conscious awareness and affects everyone."},{"t":"What is empathy?","o":["The ability to understand and share the feelings of another person","Feeling sorry for someone","Agreeing with everyone","Being emotional"],"e":"Empathy is foundational to reducing bias and increasing inclusion."},{"t":"What does it mean to challenge your own assumptions?","o":["Questioning beliefs you hold about groups without evidence","Being uncertain about everything","Doubting yourself","Being indecisive"],"e":"Challenging assumptions is essential to reducing bias."},{"t":"What is active listening?","o":["Giving full attention to a speaker and trying to understand their experience","Waiting for your turn to speak","Nodding along","Taking notes"],"e":"Active listening builds understanding across differences."},{"t":"What is a cognitive shortcut?","o":["A mental pattern the brain uses to make quick judgments that can lead to bias","A clever idea","A memory technique","A learning strategy"],"e":"Cognitive shortcuts help the brain process information quickly but can produce biased judgments."},{"t":"Why is it uncomfortable to examine your own biases?","o":["Because it challenges the belief that we are fair and good people","Because bias is always intentional","Because it is too complicated","Because nobody has biases"],"e":"Examining our biases challenges our self-image which produces psychological discomfort."},{"t":"What is perspective-taking?","o":["Deliberately trying to see a situation from another person's point of view","Changing your opinion","Agreeing with others","Seeing the big picture"],"e":"Perspective-taking is a key skill for reducing bias and building empathy."},{"t":"What is self-awareness in the context of bias?","o":["Recognising that you hold biases and examining how they affect your behaviour","Knowing your strengths","Being confident","Having good self-esteem"],"e":"Self-awareness is the first step in addressing bias."}],"t2":[{"t":"What is the difference between intent and impact?","o":["You can cause harm without intending to — impact is what matters to the person affected","Intent always determines harm","If you mean well no harm is done","Impact only matters if harm was intended"],"e":"Well-intentioned actions can still cause real harm."},{"t":"What is cognitive dissonance in the context of bias?","o":["The discomfort of holding two conflicting beliefs such as believing you are fair while acting in biased ways","Being confused","Changing your mind","Forgetting things"],"e":"Cognitive dissonance can cause people to deny their biases rather than address them."},{"t":"What is in-group versus out-group thinking?","o":["The tendency to favour people we see as part of our group and be more suspicious of those seen as different","Liking your friends","Being tribal","A social choice"],"e":"In-group and out-group thinking is a fundamental cognitive bias that underlies much discrimination."},{"t":"What is growth mindset and how does it relate to bias?","o":["The belief that abilities and attitudes can change through effort — people with growth mindset are more able to address their biases","Being overly optimistic","Ignoring your limits","A productivity concept"],"e":"A growth mindset enables people to see their biases as changeable rather than fixed."},{"t":"What is fundamental attribution error?","o":["Attributing others' negative behaviour to their character while attributing our own to circumstances","A logical mistake","A common misconception","Being judgmental"],"e":"Fundamental attribution error makes us harsher in judging others and more forgiving of ourselves."},{"t":"What is emotional intelligence and how does it relate to inclusion?","o":["The ability to recognise and manage your own emotions and understand others' — high EQ supports more empathetic and less biased interactions","Being very emotional","Having good social skills","Being likeable"],"e":"Emotional intelligence supports self-awareness and empathy which are both foundational to inclusive behaviour."},{"t":"What is the bystander effect in the context of witnessing bias?","o":["The tendency to not intervene when others are present because we assume someone else will act","Being passive","Being uninvolved","A social problem"],"e":"Understanding the bystander effect can help people overcome it and become active bystanders."},{"t":"What is implicit association?","o":["An automatic mental link between concepts such as between certain groups and positive or negative traits","A deliberate connection","A logical conclusion","A type of memory"],"e":"Implicit associations shape our behaviour without our awareness."}],"t3":[{"t":"What is debiasing and does it reliably work?","o":["Debiasing refers to techniques to reduce bias — research shows limited long-term effectiveness without structural supports","Debiasing is always effective","Bias can be completely eliminated","Debiasing is impossible"],"e":"Awareness helps but structural constraints on biased behaviour are needed for lasting change."},{"t":"What is identity threat and how does it affect learning about bias?","o":["When people feel their identity is attacked by discussions of bias they become defensive and less able to process new information","Identity is always relevant in bias discussions","People always respond well to feedback about bias","Defensiveness is always about guilt"],"e":"Reducing identity threat — by framing bias as universal not personal — supports more productive learning."},{"t":"What is the difference between guilt and accountability in the context of bias?","o":["Guilt is self-focused and paralysing while accountability is other-focused and action-oriented — accountability is more useful","Guilt is always useful","They are the same thing","Accountability is just feeling bad"],"e":"Shame and guilt shut people down. Accountability opens the possibility of change."},{"t":"What is system justification theory?","o":["The tendency to defend and justify existing social systems even when they disadvantage the person doing the justifying","Liking the current system","A political theory","Being satisfied with the status quo"],"e":"System justification theory explains why people from disadvantaged groups sometimes resist changes that would benefit them."},{"t":"What is metacognition and why does it matter for bias?","o":["Thinking about your own thinking — metacognition allows you to notice when your cognitive processes might be biased","Being very smart","Overthinking","A learning technique only"],"e":"Metacognition is the foundation of bias awareness — you have to notice your thinking to examine it."},{"t":"What is the role of discomfort in meaningful learning about bias?","o":["Some discomfort is necessary for real learning about bias because examining our assumptions challenges our self-image — but overwhelming shame prevents learning","Discomfort always helps","Comfortable learning is better","Discomfort always prevents learning"],"e":"The challenge is calibrating discomfort — enough to motivate change but not so much it triggers defensive shutdown."},{"t":"What is the counter-stereotypic exemplar approach to reducing bias?","o":["Exposure to examples that contradict stereotypes — like a Black CEO or female engineer — can weaken automatic associations over time","Counter-examples prove stereotypes wrong","Examples have no effect on bias","Seeing one exception changes nothing"],"e":"Research shows repeated exposure to counter-stereotypic exemplars can weaken automatic biased associations."},{"t":"What is the relationship between stress and bias expression?","o":["Stress depletes cognitive resources needed to override automatic biased responses meaning people are more likely to act on bias when stressed or cognitively overloaded","Stress eliminates bias","Stress has no effect on bias","Bias only appears when people are calm"],"e":"The demanding conditions in which many high-stakes decisions are made are exactly the conditions that amplify bias."}],"t4":[{"t":"What is the psychological research on whether bias can be permanently eliminated?","o":["Research suggests automatic associations are deeply embedded and cannot be fully eliminated but can be managed through conscious override and structural constraints","Bias can be completely eliminated with training","Bias is permanent and cannot be changed","A single training session eliminates bias"],"e":"Current consensus is that bias management is more achievable than bias elimination."},{"t":"What is motivated reasoning in the context of examining privilege?","o":["The tendency to seek and interpret information in ways that confirm what we want to believe — for privileged groups this often means unconsciously seeking evidence that inequality is deserved","Being very motivated","Researching carefully","A logical approach"],"e":"Motivated reasoning makes it very hard for people to accept evidence of their own privilege."},{"t":"What is values affirmation and how does it reduce defensiveness in bias work?","o":["Reflecting on core personal values before discussing bias reduces identity threat and makes people more open to examining their biases","Listing your good qualities","Positive thinking","Moral licensing"],"e":"Claude Steele and others found that values affirmation buffers against identity threat enabling more honest engagement with bias."},{"t":"What is implementation intention and how does it help translate anti-bias awareness into action?","o":["Making specific if-then plans for how you will respond in particular situations increases the chance of actually acting differently when bias-triggering moments occur","Intending to be fair","Having good values","A motivation technique"],"e":"Vague intentions to be less biased have little effect. Specific plans for specific situations show much stronger results."},{"t":"What is the role of narrative and storytelling in changing biased beliefs?","o":["Stories can change attitudes more effectively than statistics because they engage empathy and allow people to experience other perspectives without triggering defensiveness","Statistics are more persuasive than stories","Storytelling is only entertainment","Narratives cannot change bias"],"e":"Research in narrative persuasion shows that engaging stories can shift attitudes that direct argument cannot."},{"t":"What is the relationship between power accountability and bias in organisations?","o":["People in positions of power face less accountability for biased behaviour meaning bias has more consequence the higher up the organisation you go and power itself can reduce empathy","Power reduces bias","Leaders are always held accountable","Bias decreases with seniority"],"e":"Research on power and dehumanisation shows that power reduces perspective-taking and accountability structures are essential."},{"t":"What is the dual process theory of cognition and how does it explain implicit bias?","o":["System 1 is fast and automatic producing implicit associations while System 2 is slow and deliberate producing explicit values — people can hold egalitarian values while automatic System 1 processes express bias","People with egalitarian values have no bias","Explicit and implicit attitudes always match","You can choose which system operates"],"e":"Kahneman's dual process framework helps explain how people can sincerely believe they are fair while acting in biased ways in automatic situations."},{"t":"What is the difference between prejudice reduction approaches that focus on awareness versus structural change?","o":["Awareness approaches change individual attitudes while structural approaches change the conditions under which decisions are made — research suggests structural approaches are more reliable","Awareness is always sufficient","Structural approaches ignore individuals","Both are equally effective always"],"e":"Structural approaches reduce reliance on individuals consistently applying their awareness in high-pressure or automatic decision contexts."}],"t5":[{"t":"What does the research on the Implicit Association Test actually show?","o":["IAT scores show the existence of implicit associations but have inconsistent predictive validity for actual discriminatory behaviour — the relationship between implicit bias and behaviour is complex and mediated by context","IAT scores perfectly predict behaviour","High IAT scores mean you will always discriminate","IAT scores are meaningless"],"e":"The IAT debate illuminates a genuine scientific question about how implicit attitudes relate to behaviour and what conditions moderate that relationship."},{"t":"What is the theoretical contribution of social identity theory to understanding bias?","o":["Social identity theory shows that mere group membership produces in-group favouritism and out-group discrimination even with no history of conflict and no material competition","Bias requires a long history of conflict","Discrimination requires material stakes","Groups naturally cooperate"],"e":"Tajfel and Turner's minimal group paradigm showed that categorisation alone is sufficient to produce discrimination."},{"t":"What is the limitation of the contact hypothesis as a solution to intergroup bias?","o":["Contact between groups reduces bias only under specific conditions of equal status cooperation institutional support and personal acquaintance — most real-world intergroup contact lacks these conditions","Contact always reduces bias","Any contact between groups reduces bias","Segregation produces less bias than contact"],"e":"Gordon Allport's contact hypothesis has been qualified by decades of research showing that poorly structured contact can worsen intergroup relations."},{"t":"What is the relationship between certainty and bias?","o":["People who feel more certain of their beliefs and judgments are often less likely to examine them for bias — uncertainty and intellectual humility support more careful reasoning","Certainty always improves decision quality","Confident people make better decisions","Uncertainty only causes anxiety"],"e":"Research on actively open-minded thinking shows that valuing uncertainty and being open to revision reduces biased reasoning."},{"t":"What is the argument that individual psychological approaches to bias are insufficient without political and economic change?","o":["Because bias is produced and reproduced by social systems and material conditions — without changing those structures individual attitude change is insufficient to produce equitable outcomes","Individual change is always sufficient","Attitudes cause all structural problems","Political change is impossible"],"e":"The most sophisticated bias researchers now argue that individual-level interventions must be combined with institutional and structural reform to produce lasting change."},{"t":"What is the phenomenology of bias experience for those targeted?","o":["People who face bias must constantly navigate interpret and respond to ambiguous situations deciding whether to name it let it go or confront it at significant psychological cost","Experiencing bias is straightforward","People always know when they are being discriminated against","The target's experience is always clearly communicated"],"e":"The psychological burden of chronic exposure to potential bias — the hypervigilance the interpretive labour — is itself a significant harm."},{"t":"What is the role of cognitive load in bias research?","o":["When people are cognitively busy or stressed they rely more on automatic processes including biased associations — this is why debiasing in high-load contexts is particularly difficult","Cognitive load reduces bias","People are more careful when busy","Bias only occurs in simple situations"],"e":"The demanding conditions in which many high-stakes decisions are made are exactly the conditions that amplify bias."},{"t":"What is the argument from social psychology that changing behaviour produces more attitude change than changing attitudes produces behaviour change?","o":["Research suggests that structural interventions that change behaviour first may produce more lasting attitude change than trying to change attitudes in order to change behaviour","Attitudes always drive behaviour","Behaviour change is impossible without attitude change first","Attitudes and behaviour are always aligned"],"e":"This insight from behaviour-attitude research has important implications for how organisations approach bias — changing the rules rather than just the mindsets may be more effective."}]},"language":{"t1":[{"t":"What is language in the context of bias?","o":["How language shapes experiences of bias and inclusion","A simple definition","A school subject","An unrelated concept"],"e":"Language is an important lens for understanding bias and inclusion."},{"t":"Can language affect someone's experience of discrimination?","o":["Yes language can make people more vulnerable to bias","No language is irrelevant","Only in extreme cases","Only in certain cultures"],"e":"Language intersects with discrimination in important ways."},{"t":"What is an example of language-based bias?","o":["Treating someone unfairly based on assumptions about their language","Treating everyone the same","Noticing differences","Making observations"],"e":"Language-based bias affects many areas of everyday life."},{"t":"Why is awareness of language important for inclusion?","o":["Because language-related assumptions can produce unfair outcomes even without deliberate intent","It is not important","Only for researchers","Only for people directly affected"],"e":"Awareness is the first step toward addressing language-based inequity."},{"t":"Can language bias be unconscious?","o":["Yes many biases related to language operate below conscious awareness","No bias is always deliberate","Only sometimes","Only in certain professions"],"e":"Unconscious bias is well-documented and affects decision-making even among people committed to fairness."},{"t":"What does it mean to challenge language bias?","o":["Questioning your assumptions about people based on their language and treating them as individuals","Being confrontational","Ignoring differences","Denying that bias exists"],"e":"Challenging language bias requires self-reflection and active effort."},{"t":"How does language intersect with other forms of identity?","o":["Language intersects with race gender class and other identities to produce complex experiences of privilege and marginalisation","It operates independently","Intersectionality only applies to some categories","Only one identity matters"],"e":"Intersectionality teaches us that no single aspect of identity operates in isolation."},{"t":"What can individuals do to address language bias?","o":["Educate themselves reflect on their assumptions and actively challenge biased behaviour when they see it","Nothing it is a systemic problem only","Change other people","Ignore it"],"e":"Individual and structural change both matter."}],"t2":[{"t":"What is structural language bias?","o":["When systems and institutions produce unequal outcomes based on language without individual intent","Only individual prejudice counts","Structural bias does not exist","Only legal discrimination matters"],"e":"Structural language bias operates through institutions and norms not just individual attitudes."},{"t":"How does language bias affect people's opportunities?","o":["It can restrict access to education employment healthcare and other life opportunities based on language","It has no effect","Only in extreme cases","Only affects some groups"],"e":"Language bias compounds over a lifetime producing significant differences in outcomes."},{"t":"Why is representation important in the context of language?","o":["Because seeing diverse language representation in positive roles shapes self-image and counters stereotypes","Representation is only symbolic","It only matters for children","It has no effect on attitudes"],"e":"Representation shapes who is seen as capable and belonging."},{"t":"How does language bias manifest in everyday interactions?","o":["Through microaggressions assumptions and different treatment based on language often unintentionally","Only in extreme discrimination","Only in formal settings","Only when people are trying to discriminate"],"e":"Everyday language bias can be subtle but accumulates over time causing real harm."},{"t":"What is the relationship between language and systemic inequality?","o":["Language-based inequality is often built into social systems producing unequal outcomes even without individual prejudice","Systemic inequality is unrelated to language","Systemic inequality is always deliberate","Individual prejudice is the only form of language inequality"],"e":"Systemic inequality operates through structures not just individual attitudes."},{"t":"What role does language play in language bias?","o":["Language can reinforce language stereotypes and hierarchies or can challenge them — the words we use matter","Language has no effect on bias","Language is only important in formal contexts","Language change is purely symbolic"],"e":"Language both reflects and shapes social attitudes toward different groups."},{"t":"How can organisations address language bias?","o":["Through structural changes to hiring evaluation promotion and culture that reduce the role of language assumptions in decisions","By ignoring language altogether","Through individual training alone","By talking about language more"],"e":"Structural approaches to reducing bias are more effective than awareness training alone."},{"t":"What is an ally in the context of language bias?","o":["Someone who actively supports people disadvantaged by language bias even when they themselves are not affected","A person who agrees with you","A close friend","Someone from the same group"],"e":"Allyship involves using your position to advocate for those facing discrimination."}],"t3":[{"t":"What is the difference between individual and structural language bias?","o":["Individual bias is personal attitude; structural language bias is embedded in systems and produces unequal outcomes regardless of individual intent","They are the same thing","Individual bias is always more harmful","Structural bias does not exist"],"e":"Both individual and structural language bias operate together to produce inequality."},{"t":"How does intersectionality apply to language bias?","o":["People with multiple marginalised identities alongside language experience compounded forms of discrimination that cannot be understood by examining one axis alone","Intersectionality does not apply to language","Only one identity matters at a time","All forms of bias are identical"],"e":"Intersectional analysis reveals how different forms of bias compound and interact."},{"t":"Why might well-intentioned people still perpetuate language bias?","o":["Language bias can be unconscious built into standard practices or embedded in systems that produce unequal outcomes even without individual prejudice","Only bad people have biases","Intent always determines impact","Well-intentioned people are always bias-free"],"e":"Good intentions are not sufficient to prevent harm when bias operates through systems and automatic processes."},{"t":"What is the role of policy in addressing language bias?","o":["Policies that produce equal outcomes rather than just equal treatment are needed because removing formal barriers does not eliminate the effects of historical language bias","Policies are not needed once individual bias is addressed","All policies make language bias worse","Policy is sufficient on its own"],"e":"Policy change must accompany individual and cultural change to produce lasting equity."},{"t":"What is the evidence that language bias has real-world consequences?","o":["Research shows language-based discrimination affects employment health legal outcomes and quality of life even when controlling for other factors","There is no evidence that language bias has real effects","Effects are only psychological","Only extreme bias has real consequences"],"e":"The empirical literature consistently documents real-world effects of bias on outcomes across many domains."},{"t":"How does representation in positions of power relate to language bias?","o":["When people from language-marginalised groups are excluded from power those groups' interests are underrepresented in decisions that affect them — representation in power matters for equity","Representation in power does not affect language bias","Only street-level discrimination matters","Powerful people are always fair"],"e":"Who holds power shapes whose interests are reflected in policies institutions and decisions."},{"t":"What is the relationship between language bias and health outcomes?","o":["Language bias in healthcare affects diagnosis treatment and access to care producing documented health disparities that are not explained by biological differences","Healthcare is always bias-free","Health disparities are always biological","Only extreme bias affects health outcomes"],"e":"Health disparities track social inequalities including those related to language reflecting how bias affects healthcare access and quality."},{"t":"Why is measuring language bias difficult?","o":["People do not always report or act on their biases — researchers use implicit association tests audit studies and natural experiments to detect bias in behaviour","Bias is always easy to measure","Self-reports are always accurate","Measuring bias is impossible"],"e":"The gap between stated attitudes and actual behaviour means multiple measurement approaches are needed to understand the full extent of bias."}],"t4":[{"t":"What is the paradox of explicit commitment to language equity alongside persistent inequality?","o":["Most people and institutions genuinely endorse language equity but structural bias institutional inertia and unconscious processes continue to produce unequal outcomes — good intentions are not sufficient","This paradox does not exist","If people endorse equity they will achieve it","Only people who do not endorse equity produce inequality"],"e":"The persistence of bias despite explicit endorsement of equality demonstrates that structural change requires more than attitude change."},{"t":"How does the concept of meritocracy interact with language bias?","o":["The belief in meritocracy can mask language bias by attributing unequal outcomes to individual merit when they actually reflect structural disadvantage","Meritocracy always produces fair outcomes","Meritocracy eliminates language bias","Meritocracy and language bias are unrelated"],"e":"Research shows that meritocracy as an ideology can make bias worse by providing cover for biased judgments that feel objective."},{"t":"What is the relationship between language bias and economic inequality?","o":["Language bias and economic inequality are mutually reinforcing — bias limits access to economic resources while economic inequality limits the power to challenge bias","They are unrelated","Economic inequality causes language bias but not vice versa","Language bias is purely cultural"],"e":"The relationship between bias and economic inequality is bidirectional and mutually reinforcing."},{"t":"How do implicit and explicit language bias relate to each other?","o":["People can hold explicit egalitarian beliefs while implicit automatic processes express bias — the two are related but distinct and explicit commitment to equality does not guarantee bias-free behaviour","Implicit and explicit bias always match","Explicit endorsement of equality eliminates implicit bias","Implicit bias is more important than explicit bias in all cases"],"e":"The distinction between implicit and explicit bias has important implications for how we understand and address prejudice."},{"t":"What is the argument that addressing language bias requires systemic not just individual change?","o":["Language bias is embedded in systems and institutions so individual attitude change leaves the structural conditions that produce biased outcomes intact — systemic change is required for lasting equity","Individual change is always sufficient","Systems cannot change","Only individual prejudice matters"],"e":"The most effective approaches to reducing bias address both individual attitudes and the structural conditions that amplify and reproduce biased outcomes."},{"t":"What is the role of data and evidence in addressing language bias?","o":["Collecting data disaggregated by language-relevant characteristics reveals where inequalities exist and enables accountability — without data organisations can deny or ignore the effects of bias","Data is not needed","All organisations already know where bias exists","Data collection always makes things worse"],"e":"What gets measured gets managed — data disaggregation is a critical tool for identifying and addressing bias."},{"t":"How does language bias interact with other systems of power?","o":["Language bias does not operate in isolation but interacts with race gender class and other systems of power producing compounded and intersecting forms of disadvantage","Bias systems are always independent","Only one system of power operates at a time","Language bias is always the most important"],"e":"Understanding how bias systems interact is essential to designing effective responses."},{"t":"What is the relationship between language bias and institutional culture?","o":["Organisational culture reflects and reinforces language bias through informal norms expectations and practices that a judice","Only bad people have biases","Intent always determines impact","Well-intentioned people are always bias-free"],"e":"Good intentions are not sufficient to prevent harm when bias operates through systems and automatic processes."},{"t":"What is the role of policy in addressing groups bias?","o":["Policies that produce equal outcomes rather than just equal treatment are needed because removing formal barriers does not eliminate the effects of historical groups bias","Policies are not needed once individual bias is addressed","All policies make groups bias worse","Policy is sufficient on its own"],"e":"Policy change must accompany individual and cultural change to produce lasting equity."},{"t":"What is the evidence that groups bias has real-world consequences?","o":["Research shows groups-based discrimination affects employment health legal outcomes and quality of life even when controlling for other factors","There is no evidence that groups bias has real effects","Effects are only psychological","Only extreme bias has real consequences"],"e":"The empirical literature consistently documents real-world effects of bias on outcomes across many domains."},{"t":"How does representation in positions of power relate to groups bias?","o":["When people from groups-marginalised groups are excluded from power those groups' interests are underrepresented in decisions that affect them — representation in power matters for equity","Representation in power does not affect groups bias","Only street-level discrimination matters","Powerful people are always fair"],"e":"Who holds power shapes whose interests are reflected in policies institutions and decisions."},{"t":"What is the relationship between groups bias and health outcomes?","o":["Groups bias in healthcare affects diagnosis treatment and access to care producing documented health disparities that are not explained by biological differences","Healthcare is always bias-free","Health disparities are always biological","Only extreme bias affects health outcomes"],"e":"Health disparities track social inequalities including those related to groups reflecting how bias affects healthcare access and quality."},{"t":"Why is measuring groups bias difficult?","o":["People do not always report or act on their biases — researchers use implicit association tests audit studies and natural experiments to detect bias in behaviour","Bias is always easy to measure","Self-reports are always accurate","Measuring bias is impossible"],"e":"The gap between stated attitudes and actual behaviour means multiple measurement approaches are needed to understand the full extent of bias."}],"t4":[{"t":"What is the paradox of explicit commitment to groups equity alongside persistent inequality?","o":["Most people and institutions genuinely endorse groups equity but structural bias institutional inertia and unconscious processes continue to produce unequal outcomes — good intentions are not sufficient","This paradox does not exist","If people endorse equity they will achieve it","Only people who do not endorse equity produce inequality"],"e":"The persistence of bias despite explicit endorsement of equality demonstrates that structural change requires more than attitude change."},{"t":"How does the concept of meritocracy interact with groups bias?","o":["The belief in meritocracy can mask groups bias by attributing unequal outcomes to individual merit when they actually reflect structural disadvantage","Meritocracy always produces fair outcomes","Meritocracy eliminates groups bias","Meritocracy and groups bias are unrelated"],"e":"Research shows that meritocracy as an ideology can make bias worse by providing cover for biased judgments that feel objective."},{"t":"What is the relationship between groups bias and economic inequality?","o":["Groups bias and economic inequality are mutually reinforcing — bias limits access to economic resources while economic inequality limits the power to challenge bias","They are unrelated","Economic inequality causes groups bias but not vice versa","Groups bias is purely cultural"],"e":"The relationship between bias and economic inequality is bidirectional and mutually reinforcing."},{"t":"How do implicit and explicit groups bias relate to each other?","o":["People can hold explicit egalitarian beliefs while implicit automatic processes express bias — the two are related but distinct and explicit commitment to equality does not guarantee bias-free behaviour","Implicit and explicit bias always match","Explicit endorsement of equality eliminates implicit bias","Implicit bias is more important than explicit bias in all cases"],"e":"The distinction between implicit and explicit bias has important implications for how we understand and address prejudice."},{"t":"What is the argument that addressing groups bias requires systemic not just individual change?","o":["Groups bias is embedded in systems and institutions so individual attitude change leaves the structural conditions that produce biased outcomes intact — systemic change is required for lasting equity","Individual change is always sufficient","Systems cannot change","Only individual prejudice matters"],"e":"The most effective approaches to reducing bias address both individual attitudes and the structural conditions that amplify and reproduce biased outcomes."},{"t":"What is the role of data and evidence in addressing groups bias?","o":["Collecting data disaggregated by groups-relevant characteristics reveals where inequalities exist and enables accountability — without data organisations can deny or ignore the effects of bias","Data is not needed","All organisations already know where bias exists","Data collection always makes things worse"],"e":"What gets measured gets managed — data disaggregation is a critical tool for identifying and addressing bias."},{"t":"How does groups bias interact with other systems of power?","o":["Groups bias does not operate in isolation but interacts with race gender class and other systems of power producing compounded and intersecting forms of disadvantage","Bias systems are always independent","Only one system of power operates at a time","Groups bias is always the most important"],"e":"Understanding how bias systems interact is essential to designing effective responses."},{"t":"What is the relationship between groups bias and institutional culture?","o":["Organisational culture reflects and reinforces groups bias through informal norms expectations and practices that are often invisible to those who benefit from them — cultural change requires intentional effort","Institutional culture is always neutral","Culture is separate from bias","Only formal policies matter"],"e":"Informal cultural norms often do more to sustain bias than formal policies and are harder to change."}],"t5":[{"t":"What is the theoretical argument that groups bias is a structural feature not an individual aberration?","o":["Groups bias is not simply the sum of individual prejudices but is embedded in social structures institutions and cultural norms that reproduce inequality independently of individual intent","All bias is purely individual","Structure is irrelevant to groups bias","Individual prejudice is the only real form of bias"],"e":"Structural accounts of bias challenge the assumption that addressing individual attitudes is sufficient to produce equity."},{"t":"What is the epistemological problem with studying groups bias?","o":["Those who study groups bias bring their own assumptions and biases to the research — achieving genuinely objective analysis requires reflexivity about the researcher's own positionality","Research on groups bias is always objective","The researcher's identity is irrelevant","Bias research is impossible"],"e":"The challenge of studying bias from within a system of bias raises important questions about how we know what we know about inequality."},{"t":"What is the relationship between groups bias and the concept of normalcy?","o":["What is considered normal in a groups context reflects the characteristics of dominant groups — groups differences from this norm are constructed as deviant even when they are simply different","Normalcy is a neutral concept","Normal means the statistical majority","Groups differences are always deficits"],"e":"The construction of normalcy encodes privilege and marginalisation into everyday judgments about who belongs and who is valued."},{"t":"What is the political economy of groups inequality?","o":["Groups inequality intersects with economic structures — access to capital wealth networks and opportunity are distributed unequally along groups lines reflecting and reinforcing broader patterns of power","Economic and groups inequality are unrelated","Groups inequality is purely cultural","Economic factors always explain groups inequality"],"e":"Understanding the political economy of groups inequality requires examining how material conditions and cultural dynamics mutually constitute each other."},{"t":"What is the relationship between groups bias and the legitimation of inequality?","o":["Groups bias produces inequality which is then explained away as the result of natural differences or individual merit — this legitimation makes challenging inequality harder by making it seem fair","Inequality is always legitimated fairly","Legitimation and bias are unrelated","Groups inequality is always obviously unjust"],"e":"The ideological work of legitimating inequality is central to how systems of bias reproduce themselves across generations."},{"t":"What does an intersectional analysis of groups bias reveal that single-axis analysis misses?","o":["Intersectional analysis reveals how groups bias operates differently for people with different identities — the experience of bias is not additive but produces qualitatively distinct forms of disadvantage and advantage","Intersectionality overcomplicates groups analysis","Single-axis analysis is always sufficient","Intersectionality only applies to some groups"],"e":"Kimberle Crenshaw's intersectionality framework shows that understanding bias requires examining how multiple systems of inequality operate together."},{"t":"What is the argument that overcoming groups bias requires transformation not just reform?","o":["When groups bias is built into the foundations of institutions reform of those institutions while leaving their basic structure intact may reproduce bias in new forms — transformation means rethinking the fundamental organising principles","Reform is always sufficient","Transformation is impossible","Only minor adjustments are needed"],"e":"The reform versus transformation debate in social justice movements reflects genuine disagreement about what is needed to achieve equity."},{"t":"What is the relationship between groups bias and knowledge production?","o":["Groups bias shapes what questions get asked what counts as valid evidence and whose expertise is recognised — knowledge production is not neutral but reflects and reproduces existing power relations","Groups bias does not affect knowledge production","Academics are always objective","Bias only affects applied not theoretical knowledge"],"e":"The sociology of knowledge reveals how groups bias shapes what we know and what we treat as known."}]}};
function qTier2(d){if(d<=10)return 't1';if(d<=20)return 't2';if(d<=30)return 't3';if(d<=40)return 't4';return 't5';}
function shuf2(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function getQ(cat,d){
  var tier=qTier2(d);
  var pool=(QS2[cat]&&QS2[cat][tier])?QS2[cat][tier]:QS2['general'][tier];
  var shuffled=shuf2(pool.slice());
  var q=shuffled[0];
  var opts=q.o.map(function(text,i){return{text:text,correct:i===0};});
  for(var i=opts.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=opts[i];opts[i]=opts[j];opts[j]=t;}
  return{t:q.t,opts:opts,e:q.e};
}
