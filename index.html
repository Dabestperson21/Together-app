ality explain that looking at just race or just gender alone misses?',a:['That overlapping identities create unique forms of discrimination','That all discrimination is the same','That some people face more than others','That discrimination is very complicated'],e:'A Black woman experience is distinct from what a white woman or Black man faces.'},{q:'What is stereotype threat?',a:['Being aware you might confirm a negative stereotype about your group causes anxiety that actually impairs performance','Being threatened because of a stereotype','Fear of others assumptions','Peer pressure'],e:'Stereotype threat is self-fulfilling.'},{q:'What is moral licensing?',a:['When a past good action gives unconscious permission to act less ethically afterward','Having permission to be moral','Being morally strict','A legal concept'],e:'Moral licensing is dangerous because it operates unconsciously.'},{q:'What is colorblind ideology?',a:['The belief that ignoring race promotes equality, while actually denying the lived experience of racism','Not being able to see colours','A helpful approach to reducing bias','Being racially neutral'],e:'Colorblind ideology prevents acknowledgment of real racial inequities.'},{q:'A doctor dismisses a Black patient pain as probably stress. This reflects:',a:['Racial bias in healthcare','Good clinical judgment','Standard medical practice','The patient being difficult'],e:'Medical racial bias is well-documented.'},{q:'What is pluralistic ignorance?',a:['Everyone privately disagrees with a norm but publicly goes along because each assumes others agree','Being ignorant as a group','Group stupidity','Being generally uninformed'],e:'Pluralistic ignorance explains why biased behaviour can persist even when everyone is privately uncomfortable.'},{q:'What is aversive racism?',a:['When people who believe themselves to be non-racist still hold negative unconscious racial associations','Being openly against racism','Avoiding racism entirely','Being racist in disguise'],e:'Aversive racism is insidious because those who hold it do not see themselves as biased.'},{q:'Girls told boys score higher in maths before a test and then score lower. This demonstrates:',a:['Stereotype threat, the warning itself impairs performance','That the test is too hard','Confirmation bias','Teaching methods'],e:'The mere awareness of a negative stereotype is enough to impair performance.'},{q:'Why do mandatory diversity training programmes often fail long-term?',a:['Because mandatory training triggers psychological reactance, people resist having attitudes changed for them','Because people do not pay attention','Because they are too short','Because people forget things'],e:'When people feel coerced into attitude change, they resist it.'},{q:'A company blind CV screening produces diverse shortlists but diverse candidates still are not hired. This suggests:',a:['That bias re-enters at the interview and evaluation stage','That blind screening does not work','That those candidates are less qualified','That the company is doing fine'],e:'Structural bias operates at every stage.'},{q:'What is benevolent sexism?',a:['Seemingly positive but patronising attitudes toward women that reinforce traditional gender roles','A mild form of sexism','Being kind to women','Complimenting women'],e:'Benevolent sexism sounds nice but reinforces harmful stereotypes.'},{q:'What is diagnostic overshadowing in healthcare?',a:['When a patient disability or identity becomes a catch-all explanation that prevents proper diagnosis','A type of misdiagnosis','A difficult medical test','A lighting issue'],e:'Diagnostic overshadowing causes doctors to attribute unrelated symptoms to a patient background.'}],tier4:[{q:'What is epistemic injustice and why does it matter for bias?',a:['Wronging someone specifically in their capacity as a knower, dismissing their account because of who they are','Unfair legal processes','A philosophical concept with no practical use','Being misinformed'],e:'Epistemic injustice occurs when testimony is dismissed because of the speaker identity.'},{q:'What is the model minority myth and why is it structurally harmful?',a:['The stereotyping of an entire group as uniformly successful, used to dismiss discrimination claims and divide communities of colour','A positive recognition','An accurate statistical observation','A well-meaning compliment'],e:'The model minority myth denies discrimination and is weaponised to pit communities of colour against each other.'},{q:'Police use historical arrest data to decide where to patrol more heavily. Why is this a structural bias loop?',a:['More policing produces more arrests, which justifies more policing, the data reflects past bias, not actual crime rates','Historical data is always reliable','Police need data to work efficiently','Crime is genuinely higher in those areas'],e:'Using arrest data shaped by discriminatory over-policing creates a self-reinforcing structural bias loop.'},{q:'What is role congruity bias and how does it affect women in leadership?',a:['Women are penalised for displaying leadership traits because those traits violate gender role expectations','A preference for certain roles','A type of performance review bias','Men being better at leadership'],e:'Role congruity bias means the same confident behaviour praised in a man is labelled aggressive or bossy in a woman.'},{q:'What is racial battle fatigue?',a:['The cumulative psychological and physiological stress responses that people of colour experience from constant encounters with racism','Being tired of talking about race','A medical condition','Being racially sensitive'],e:'Racial battle fatigue describes the real, documented toll that chronic exposure to racism takes.'},{q:'What distinguishes institutional racism from individual racism?',a:['Institutional racism operates through systems, policies and norms that produce racially unequal outcomes even without individual racist intent','They are the same thing','Institutional racism is worse','Individual racism is more common'],e:'Institutional racism does not require any individual to hold racist beliefs, it operates structurally.'},{q:'What is interest convergence as described by Derrick Bell?',a:['The theory that advances in racial equality have historically occurred only when they also served the interests of white Americans','When different interests align by chance','A business concept','A legal principle'],e:'Bell interest convergence thesis argues that civil rights gains tend to happen when they also benefit the dominant group.'},{q:'What is covering in the context of workplace inclusion?',a:['The process by which people with stigmatised identities downplay those identities in professional settings to avoid discrimination','Hiding physical features','A type of job promotion','Wearing appropriate clothing'],e:'Research shows that most people from marginalised groups engage in covering at work, at significant psychological cost.'},{q:'What is structural gaslighting as distinct from individual gaslighting?',a:['When institutions and dominant narratives systematically deny the experiences and realities of marginalised groups','Gaslighting by a group of people','Being gaslit by a system','Political propaganda'],e:'Structural gaslighting operates at a societal level.'},{q:'Why does diversity without inclusion often fail?',a:['Because representation without belonging means people from marginalised groups experience tokenism, exhaustion and higher attrition','Because diversity initiatives are too expensive','Because companies are not trying hard enough','Because diversity targets are too high'],e:'You can have diverse representation while still having an environment where marginalised people do not feel safe or valued.'},{q:'What is white fragility as defined by Robin DiAngelo?',a:['The defensive reactions many white people have when their racial comfort or sense of racial innocence is challenged','White people being physically fragile','A medical condition','Being overly sensitive generally'],e:'White fragility describes how low tolerance for racial discomfort can shut down conversations about racism.'},{q:'Why is the concept of implicit bias sometimes criticised by scholars?',a:['Because the main measurement tool (the IAT) has shown inconsistent predictive validity for actual behaviour','Because bias does not exist','Because it lets people off the hook','Because it is too complicated'],e:'The critique is not that bias does not exist, but that the research on how to change it is more complicated than popular training suggests.'}],tier5:[{q:'What is the difference between prejudice, discrimination, and oppression as a system?',a:['Prejudice is attitude, discrimination is action, oppression combines both with institutional power','They all mean the same thing','Prejudice is worse than discrimination','Oppression is just a strong form of prejudice'],e:'Oppression requires systemic power, which is why individuals from marginalised groups cannot oppress dominant groups in the same structural sense.'},{q:'Why is asking a Black colleague to speak for all Black people a microaggression?',a:['It reduces an individual to a spokesperson for their entire race, an exhausting and dehumanising burden','It is actually helpful curiosity','It only becomes harmful if the person objects','It depends on the relationship'],e:'This is called racial tokenism and places an unfair burden on individuals to represent a diverse group.'},{q:'What is the "bootstrap myth" and how does it relate to bias?',a:['The belief that individuals can overcome any structural disadvantage through effort alone, obscuring systemic barriers','A true description of how people succeed','A neutral observation about work ethic','A useful motivational framework'],e:'The bootstrap myth ignores structural inequality and is used to justify cutting support systems and blaming victims of systemic disadvantage.'},{q:'What is "interest divergence" and how does it complicate allyship?',a:['When the goals of marginalised groups conflict with the comfort or self-interest of allies, causing allies to pull back','When two marginalised groups disagree','A form of negotiation','A political theory'],e:'True allyship requires supporting equity even when it is personally costly or uncomfortable.'},{q:'How does "respectability politics" harm marginalised communities specifically?',a:['It places the burden of ending discrimination on its victims and disciplines those who resist in ways deemed unacceptable by the dominant culture','It provides useful guidance for navigating hostile environments','It is a neutral strategy','It only applies in professional settings'],e:'Respectability politics polices behaviour within marginalised communities and implicitly endorses the premise that discrimination is earned.'},{q:'What is "epistemic violence" and how is it distinct from epistemic injustice?',a:['The active destruction or suppression of the knowledge systems and ways of knowing of marginalised groups','A form of physical violence','A philosophical debate','The same as epistemic injustice'],e:'Epistemic violence goes beyond dismissing testimony, it involves actively erasing entire knowledge systems, as occurred with colonialism.'},{q:'What is the difference between a microaggression and a macroaggression?',a:['Microaggressions are subtle, often unconscious slights while macroaggressions are overt and explicit acts of discrimination or violence','Microaggressions are less harmful','Macroaggressions only occur in institutions','They are the same thing at different scales'],e:'Both cause harm but macro aggressions are explicit enough to be named and often legally actionable.'},{q:'How does "colour-evasiveness" differ from "colour-blindness" as a concept?',a:['Colour-evasiveness better captures that people actively choose not to discuss race rather than literally failing to see it','They mean the same thing','Colour-evasiveness is a more positive approach','Colour-blindness is the more accurate term'],e:'Scholars prefer colour-evasiveness because it captures the deliberate avoidance rather than implying a passive inability.'},{q:'What is "anticipatory racism" and how does it affect behaviour?',a:['The way people of colour adjust their behaviour in advance to manage the racism they expect to encounter','Predicting who will be racist','Preventing racist incidents before they happen','A form of paranoia'],e:'Anticipatory racism has real psychological and physiological costs and often goes unrecognised as a form of ongoing racial harm.'},{q:'How does "intersectional invisibility" operate?',a:['People with multiple subordinate identities are overlooked because they do not fit the prototype of any single marginalised group','Being invisible to the police','A form of passing privilege','Having an advantage because no one notices you'],e:'For example, Black women may be excluded from gender discrimination protections because those protections were built around white women, and from race protections built around Black men.'},{q:'What is the "normality of whiteness" and why does it matter for bias?',a:['The way whiteness functions as an invisible default in Western culture, making everything else marked as different or other','A statement that white people are normal','A biological claim','A way of describing white culture'],e:'When whiteness is treated as the neutral default, all other identities are constructed as deviant or special, embedding racial hierarchy into language and institutions.'},{q:'What is "lateral violence" within marginalised communities and what causes it?',a:['When members of a marginalised group direct aggression toward each other rather than toward the oppressive system that harms them','Violence between minority communities','An intergroup conflict','A form of self-hatred'],e:'Lateral violence is understood as internalised oppression turned outward, a product of systemic harm rather than individual pathology.'}]};

var BIASES=[{n:'Racism',cat:'Racism',bg:'#fef2f2',tc:'#991b1b',def:'Prejudice or discrimination against a person based on their race.',ex:'A landlord refusing to rent to a Black family despite them meeting all requirements.'},{n:'Colorism',cat:'Racism',bg:'#fef2f2',tc:'#991b1b',def:'Favouring lighter-skinned people over darker-skinned people, even within the same racial group.',ex:'Lighter-skinned individuals receiving more opportunities than darker-skinned peers.'},{n:'Structural racism',cat:'Racism',bg:'#fef2f2',tc:'#991b1b',def:'Systems and policies that maintain racial inequity even without individual racist intent.',ex:'Disparities in school funding tied to local property taxes.'},{n:'Colorblind ideology',cat:'Racism',bg:'#fef2f2',tc:'#991b1b',def:'Believing ignoring race promotes equality, while actually denying lived experiences of racism.',ex:'"I do not see colour" said in response to racial discrimination.'},{n:'Internalized racism',cat:'Racism',bg:'#fef2f2',tc:'#991b1b',def:'When a person of colour absorbs and accepts negative stereotypes about their own racial group.',ex:'A person of colour dismissing their own cultural traditions as less sophisticated.'},{n:'Sexism',cat:'Sexism',bg:'#fdf2f8',tc:'#9d174d',def:'Prejudice or discrimination based on a person\'s sex or gender.',ex:'A qualified woman being passed over for promotion in favour of a less experienced man.'},{n:'Benevolent sexism',cat:'Sexism',bg:'#fdf2f8',tc:'#9d174d',def:'Seemingly positive but patronising attitudes toward women that reinforce traditional gender roles.',ex:'"Women are so nurturing" used to justify keeping women in caretaking roles.'},{n:'Maternal bias',cat:'Sexism',bg:'#fdf2f8',tc:'#9d174d',def:'Assuming mothers are less committed to their careers than fathers or childless women.',ex:'Passing over a new mother for promotion, assuming she will not want more responsibility.'},{n:'Role congruity bias',cat:'Sexism',bg:'#fdf2f8',tc:'#9d174d',def:'Penalising women who display leadership traits because those traits violate gender role expectations.',ex:'A female CEO labelled aggressive for the same confident behaviour praised as strong in a male CEO.'},{n:'Implicit bias',cat:'Cognitive',bg:'#f5f3ff',tc:'#5b21b6',def:'Unconscious attitudes that affect decisions without our awareness.',ex:'A hiring manager favours resumes with white-sounding names without realising it.'},{n:'Confirmation bias',cat:'Cognitive',bg:'#f5f3ff',tc:'#5b21b6',def:'Seeking information that confirms existing beliefs while ignoring contradicting evidence.',ex:'Only reading news sources that align with your political views.'},{n:'Survivorship bias',cat:'Cognitive',bg:'#f5f3ff',tc:'#5b21b6',def:'Focusing on successes while ignoring failures.',ex:'Pointing to successful people of colour as proof racism is not a barrier.'},{n:'Moral licensing',cat:'Cognitive',bg:'#f5f3ff',tc:'#5b21b6',def:'Past good behaviour gives mental permission to act less ethically later.',ex:'Donating to charity then feeling okay to make a biased joke.'},{n:'Algorithmic bias',cat:'Cognitive',bg:'#f5f3ff',tc:'#5b21b6',def:'When automated systems reflect and amplify biases in their training data.',ex:'A hiring algorithm filtering out women because it was trained on past male hires.'},{n:'Dunning-Kruger effect',cat:'Cognitive',bg:'#f5f3ff',tc:'#5b21b6',def:'People with limited knowledge dramatically overestimate their competence.',ex:'Someone who read one article on racism confidently correcting people who have studied it for years.'},{n:'Just-world hypothesis',cat:'Cognitive',bg:'#f5f3ff',tc:'#5b21b6',def:'Believing the world is fair and people get what they deserve.',ex:'Thinking discrimination victims must have done something to deserve it.'},{n:'Affinity bias',cat:'Social',bg:'#f0fdf4',tc:'#166534',def:'Favouring people similar to yourself in background or interests.',ex:'A recruiter preferring a candidate who attended the same university.'},{n:'Halo effect',cat:'Social',bg:'#f0fdf4',tc:'#166534',def:'One positive trait creates an overall positive impression of a person.',ex:'Assuming an attractive candidate is also more competent.'},{n:'Ageism',cat:'Social',bg:'#f0fdf4',tc:'#166534',def:'Prejudice against people based on their age.',ex:'Assuming an older employee cannot learn new technology.'},{n:'Ableism',cat:'Social',bg:'#f0fdf4',tc:'#166534',def:'Discrimination against people with disabilities.',ex:'Assuming a person in a wheelchair cannot lead a team.'},{n:'Tokenism',cat:'Social',bg:'#f0fdf4',tc:'#166534',def:'Including one person from a marginalised group for appearances only.',ex:'A company recruiting one woman onto its all-male board for optics.'},{n:'Gaslighting',cat:'Social',bg:'#f0fdf4',tc:'#166534',def:'Making someone question their own perception or lived experience.',ex:'Telling a colleague their experience of discrimination was just a misunderstanding.'},{n:'Stereotype threat',cat:'Social',bg:'#f0fdf4',tc:'#166534',def:'The risk of confirming a negative stereotype about your group that impairs actual performance.',ex:'Women performing worse on maths tests after being told women score lower.'},{n:'Intersectionality',cat:'Social',bg:'#f0fdf4',tc:'#166534',def:'The way overlapping identities create unique forms of discrimination.',ex:'A Black woman facing discrimination distinct from what a white woman or Black man would experience.'},{n:'Bystander effect',cat:'Social',bg:'#f0fdf4',tc:'#166534',def:'Being less likely to intervene in a situation when others are present.',ex:'Not speaking up against a racist comment in a meeting because nobody else spoke up.'},{n:'Respectability politics',cat:'Social',bg:'#f0fdf4',tc:'#166534',def:'Belief that marginalised groups must conform to dominant norms to earn equal treatment.',ex:'Telling Black people to dress or speak differently to avoid discrimination.'},{n:'Pluralistic ignorance',cat:'Social',bg:'#f0fdf4',tc:'#166534',def:'Privately disagreeing with a norm but going along assuming others agree.',ex:'Everyone uncomfortable with a biased joke but all laughing along anyway.'}];

var CASES=[{p:[{n:'Marcus',j:'Team Lead',q:'"I do not think we should hire her, women get too emotional under pressure."'},{n:'Priya',j:'HR Manager',q:'"We should evaluate all candidates on their actual performance in the interview."'}],b:0,why:'Marcus is showing gender bias, assuming women are too emotional is a harmful stereotype.'},{p:[{n:'Derek',j:'Sales Manager',q:'"I am not comfortable with him managing our biggest client, clients prefer Americans."'},{n:'Aisha',j:'Account Director',q:'"Carlos has the strongest track record on the team."'}],b:0,why:'Derek is showing racial bias, assuming foreign-born employees are less capable.'},{p:[{n:'Janet',j:'Recruiter',q:'"His resume is great but that employment gap, probably just lazy."'},{n:'Tom',j:'Hiring Manager',q:'"Employment gaps happen for many reasons. Let us ask him about it first."'}],b:0,why:'Janet is making a negative character judgment without any evidence.'},{p:[{n:'Paul',j:'Department Head',q:'"We need young energy on this project. Someone his age just would not get it."'},{n:'Renee',j:'Project Lead',q:'"Robert has decades of experience exactly in this area. He would be a real asset."'}],b:0,why:'Paul is showing ageism, dismissing someone based on age rather than their skills.'},{p:[{n:'Sandra',j:'Office Manager',q:'"Let us put the new intern in charge of taking notes. She seems organised."'},{n:'James',j:'Senior Analyst',q:'"We should rotate note-taking. It is not fair to assume she wants that role."'}],b:0,why:'Sandra is showing gender bias by assigning a stereotypically female task.'},{p:[{n:'Nathan',j:'Teacher',q:'"I expect great things from you, your people are naturally hardworking."'},{n:'Grace',j:'Counselor',q:'"Let us focus on what this student has actually demonstrated in class."'}],b:0,why:'Nathan is using a racial stereotype, even positive stereotypes are harmful.'},{p:[{n:'Brenda',j:'Supervisor',q:'"He is great but I am worried clients will not take him seriously with that accent."'},{n:'Luis',j:'Client Manager',q:'"His client satisfaction scores are the highest on the team."'}],b:0,why:'Brenda is showing accent bias.'},{p:[{n:'Rick',j:'Manager',q:'"You are surprisingly tech-savvy for your age."'},{n:'Joan',j:'Team Member',q:'"Margaret has been using these systems longer than most of us."'},{n:'Margaret',j:'Senior Analyst',q:'"I have been building spreadsheets since before some of you were born."'}],b:0,why:'Rick is showing ageism disguised as a compliment.'},{p:[{n:'Amy',j:'Colleague',q:'"Wow, your English is amazing! Where are you really from?"'},{n:'James',j:'Team Lead',q:'"Sarah grew up here."'},{n:'Sarah',j:'Engineer',q:'"Happy to share my background, but can we focus on the sprint?"'}],b:0,why:'"Where are you really from" implies Sarah cannot truly be from here based on her appearance.'},{p:[{n:'Greg',j:'Executive',q:'"I support diversity but we have to be careful not to lower our standards."'},{n:'Fatima',j:'DEI Lead',q:'"Research consistently shows diverse teams produce better outcomes."'},{n:'Chris',j:'Department Head',q:'"Our hiring process evaluates everyone on the same criteria."'}],b:0,why:'Greg\'s statement implies diversity and quality are in conflict.'},{p:[{n:'Barry',j:'Investor',q:'"I just do not see her as a leader. I cannot put my finger on it."'},{n:'Nina',j:'VC Partner',q:'"Her numbers are exceptional and her team retention is the highest in the cohort."'},{n:'Raj',j:'Analyst',q:'"The data on her company performance is hard to argue with."'}],b:0,why:'"Cannot put my finger on it" when a woman with great metrics is passed over often masks gender bias.'},{p:[{n:'David',j:'Doctor',q:'"Your pain is probably just stress. You know how your community tends to be anxious."'},{n:'Nurse Chen',j:'RN',q:'"Let us run the standard tests to rule out anything physical first."'},{n:'Advocate',j:'Patient Advocate',q:'"The patient symptoms deserve a thorough clinical evaluation."'}],b:0,why:'David is attributing symptoms to a racial cultural stereotype.'},{p:[{n:'Ben',j:'Teacher',q:'"I do not give him extra time, his disability seems mild to me."'},{n:'Ms. Park',j:'Special Ed',q:'"The accommodation plan is required by law regardless of how the disability appears externally."'},{n:'Principal',j:'School Admin',q:'"We follow all IEP plans as written."'}],b:0,why:'Ben is showing ableism by second-guessing a documented disability accommodation.'},{p:[{n:'Frank',j:'VC',q:'"I prefer founders I can relate to, we just click better."'},{n:'Wendy',j:'Angel Investor',q:'"We need to examine whether that click is about business fit or something else."'},{n:'Carlos',j:'Fund Manager',q:'"Affinity bias costs VCs significant returns in the long run."'}],b:0,why:'Frank is explicitly describing affinity bias.'},{p:[{n:'Helen',j:'Manager',q:'"I did not give her the overseas role, I assumed she would want to stay close to her kids."'},{n:'Sarah',j:'HR Director',q:'"Did you ask her? She may have very different plans."'},{n:'Raj',j:'Team Lead',q:'"Assuming what working parents want especially affects women."'}],b:0,why:'Helen is showing maternal bias.'},{p:[{n:'Jim',j:'Police Officer',q:'"I stopped him because he looked out of place in this neighbourhood."'},{n:'Sergeant',j:'Supervisor',q:'"What specific behaviour prompted the stop?"'},{n:'Captain',j:'Precinct Chief',q:'"All stops need to be based on specific articulable behaviour."'},{n:'Officer Diaz',j:'Partner',q:'"I did not observe anything suspicious either."'}],b:0,why:'Jim is describing racial profiling.'},{p:[{n:'Donald',j:'Exec',q:'"We do not have a racism problem here. We hired a Black VP did not we?"'},{n:'Consultant',j:'DEI Advisor',q:'"One hire does not address systemic patterns in hiring, promotion, and retention."'},{n:'Employee',j:'Staff',q:'"There are still no Black people above director level in most departments."'},{n:'HR Lead',j:'HR',q:'"Representation at one level does not mean equity across the organisation."'}],b:0,why:'Donald is using a single hire to dismiss systemic racism.'},{p:[{n:'Nurse',j:'RN',q:'"He is being dramatic about his pain. These patients always exaggerate."'},{n:'Doctor',j:'Attending',q:'"Pain is subjective. We need to treat what the patient reports."'},{n:'Advocate',j:'Patient Advocate',q:'"Research shows Black patients are systematically undertreated for pain."'},{n:'Resident',j:'MD',q:'"Let us document his reported pain level accurately and treat accordingly."'}],b:0,why:'The nurse is showing racial bias in healthcare.'},{p:[{n:'Gary',j:'Investor',q:'"I love her energy but I am not sure she has the gravitas for this."'},{n:'Partner',j:'VC',q:'"Can you define gravitas? Because her track record is exceptional."'},{n:'Analyst',j:'Researcher',q:'"Gravitas is often code for characteristics more associated with men."'},{n:'Associate',j:'VC Firm',q:'"Her traction and team are stronger than half the men we funded last year."'}],b:0,why:'Gary is using gravitas as gendered coded language.'},{p:[{n:'Mark',j:'Principal',q:'"We suspend Black students more, they tend to be more disruptive."'},{n:'Counselor',j:'School Counselor',q:'"Data shows Black students are disciplined more harshly for the same behaviours as white students."'},{n:'Teacher',j:'Classroom Teacher',q:'"The behaviours I see do not match that generalisation at all."'},{n:'DEI Coordinator',j:'School DEI',q:'"This is a well-documented national pattern rooted in implicit bias."'}],b:0,why:'Mark is expressing racial bias that rationalises a discriminatory disciplinary pattern.'},{p:[{n:'CEO',j:'Tech Company',q:'"Our algorithm is objective, it just matches on skills."'},{n:'Data Scientist',j:'Engineer',q:'"The training data was mostly male hires from 2000-2015."'},{n:'HR Lead',j:'HR',q:'"We have had zero women shortlisted for engineering in six months."'},{n:'Legal',j:'Counsel',q:'"Disparate impact is a legal issue even without discriminatory intent."'}],b:0,why:'The CEO is expressing the neutrality myth.'},{p:[{n:'Professor',j:'Academic',q:'"The gender pay gap disappears when you control for industry and hours worked."'},{n:'Economist',j:'Researcher',q:'"Those controls themselves reflect gendered constraints, who chooses which industries and why?"'},{n:'Student',j:'Graduate',q:'"Women are steered away from high-paying fields from childhood."'},{n:'Union Rep',j:'Labour Organiser',q:'"The gap in female-dominated industries proves the work itself is devalued."'},{n:'HR Director',j:'Corporate HR',q:'"Our own data shows women are promoted at lower rates even within identical roles."'}],b:0,why:'The professor is using statistical controls to dismiss structural causes.'},{p:[{n:'Judge',j:'Family Court',q:'"The mother should have primary custody, children need their mother."'},{n:'Father',j:'Parent',q:'"I have been the primary caregiver for three years."'},{n:'Social Worker',j:'Child Services',q:'"The evaluation shows both parents are equally capable and involved."'},{n:'Attorney',j:'Family Lawyer',q:'"Custody decisions must be based on best interests of the child, not gender assumptions."'},{n:'Mediator',j:'Court Mediator',q:'"The father involvement and bond with the children is clearly documented."'}],b:0,why:'The judge is showing gender bias.'},{p:[{n:'Doctor',j:'GP',q:'"At your weight, most of your health issues are probably just lifestyle-related."'},{n:'Specialist',j:'Cardiologist',q:'"The symptoms you are describing warrant investigation regardless of weight."'},{n:'Nurse',j:'Triage Nurse',q:'"Her presenting symptoms match a pattern we should take seriously."'},{n:'Dietitian',j:'Clinical Dietitian',q:'"Weight stigma in healthcare causes people to avoid care and delays diagnosis."'},{n:'Patient Advocate',j:'Advocate',q:'"This patient has described these symptoms to four doctors and been dismissed each time."'}],b:0,why:'The doctor is showing weight stigma in healthcare.'},{p:[{n:'VC Partner',j:'Investment Firm',q:'"We funded all the best teams from the top three CS programs, that is where the talent is."'},{n:'Founder',j:'Entrepreneur',q:'"I went to a state school and bootstrapped to $2M ARR. What does my school have to do with this?"'},{n:'LP',j:'Investor',q:'"Eighty percent of VC dollars go to graduates of three schools. That is a structural problem."'},{n:'Analyst',j:'VC Analyst',q:'"Our own data shows school prestige does not predict company performance after Series A."'},{n:'DEI Advisor',j:'Venture Advisor',q:'"Pedigree bias is one of the most documented and costly biases in venture capital."'}],b:0,why:'The VC partner is showing affinity and prestige bias.'},{p:[{n:'Philosopher',j:'Academic',q:'"Focusing on group identity divides us, we should judge people purely as individuals."'},{n:'Sociologist',j:'Researcher',q:'"Individual judgments are shaped by group-level biases whether we acknowledge them or not."'},{n:'Activist',j:'Community Organiser',q:'"Ignoring group identity ignores the structural causes of inequality."'},{n:'Student',j:'Graduate',q:'"The people most harmed by group discrimination are rarely the ones asking us to ignore groups."'},{n:'Historian',j:'Professor',q:'"The ideology of pure individualism has historically been used to resist collective civil rights gains."'}],b:0,why:'The philosopher is expressing a form of colorblind ideology.'},{p:[{n:'HR Director',j:'Tech Company',q:'"We are post-racial here, we hire on merit alone. No quotas."'},{n:'Engineer',j:'Staff',q:'"I am the only Black engineer in a team of 40. That does not happen by accident."'},{n:'Recruiter',j:'Talent',q:'"Our sourcing is entirely from referrals, and our team is not diverse."'},{n:'Researcher',j:'Bias Researcher',q:'"Referral-based hiring is one of the most reliable ways to replicate existing demographic homogeneity."'},{n:'Lawyer',j:'Employment Attorney',q:'"Statistically significant underrepresentation is itself evidence of systemic barriers."'}],b:0,why:'The HR director is expressing the meritocracy myth.'},{p:[{n:'Author',j:'Public Intellectual',q:'"The real bias now is against white men, diversity has gone too far."'},{n:'Data Scientist',j:'Researcher',q:'"White men remain overrepresented at every level of corporate leadership relative to their population share."'},{n:'HR Analyst',j:'Workforce Analyst',q:'"Representation data shows no systematic disadvantage for white men in hiring or promotion."'},{n:'Historian',j:'Social Historian',q:'"The perception of reverse discrimination consistently spikes when marginalised groups gain any visible ground."'},{n:'Psychologist',j:'Social Psychologist',q:'"Research shows people perceive equality as bias when they are accustomed to structural advantage."'}],b:0,why:'The author is expressing the reverse racism fallacy.'},{p:[{n:'Psychiatrist',j:'Senior Clinician',q:'"His cultural background probably explains the paranoia, it is common in that community."'},{n:'Resident',j:'MD',q:'"Can we rule out organic causes before attributing this to cultural factors?"'},{n:'Patient',j:'Patient',q:'"I have been saying for months that something feels physically wrong."'},{n:'Social Worker',j:'Clinical Social Worker',q:'"Cultural attribution of psychiatric symptoms without evidence is both biased and dangerous."'},{n:'Advocate',j:'Mental Health Advocate',q:'"Black and Latino patients are significantly more likely to receive psychotic diagnoses than white patients presenting with identical symptoms."'}],b:0,why:'The psychiatrist is showing racial bias in psychiatric diagnosis.'},{p:[{n:'Senator',j:'Politician',q:'"Voter ID laws protect election integrity, everyone has ID."'},{n:'Researcher',j:'Political Scientist',q:'"Studies show these laws disproportionately disenfranchise Black and low-income voters."'},{n:'Advocate',j:'Voting Rights Org',q:'"Getting ID requires time, money, and documentation that many marginalised people lack."'},{n:'Official',j:'Election Authority',q:'"Evidence of the fraud these laws claim to prevent is vanishingly rare."'}],b:0,why:'The senator is using a neutral-sounding justification that produces racially discriminatory outcomes.'},{p:[{n:'Executive',j:'Media Company',q:'"Our data shows audiences prefer hosts who look like them, we are just following the market."'},{n:'Producer',j:'Senior Producer',q:'"That logic has been used to justify exclusion in media for 70 years."'},{n:'Researcher',j:'Media Researcher',q:'"The data actually shows diverse programming expands audiences rather than shrinking them."'},{n:'Host',j:'On-Air Talent',q:'"I have been told I am too ethnic for prime time my entire career."'},{n:'Advertiser',j:'Brand Executive',q:'"Our brand research shows consumers respond well to diverse representation."'}],b:0,why:'The executive is using market data to justify structural racism in media.'},{p:[{n:'Politician',j:'Senator',q:'"The achievement gap is a family values problem, we cannot fix culture through policy."'},{n:'Teacher',j:'Educator',q:'"My students achieve when they have resources, stability, and support, not when they are lectured about values."'},{n:'Researcher',j:'Education Researcher',q:'"Every study shows the achievement gap correlates with funding disparities, not cultural attitudes."'},{n:'Parent',j:'Community Member',q:'"My child school lost science labs and counselors while the school across town expanded theirs."'},{n:'Economist',j:'Policy Analyst',q:'"School funding inequality is one of the most powerful predictors of lifetime outcomes, and it tracks race."'}],b:0,why:'The politician is using culture-blaming to deflect from structural causes.'},{p:[{n:'Editor',j:'News Editor',q:'"We do not need a reporter covering the disability beat, it is too niche."'},{n:'Reporter',j:'Disability Reporter',q:'"Twenty-six percent of Americans have a disability. That is not niche."'},{n:'Columnist',j:'Opinion Writer',q:'"The lack of disability coverage in mainstream media reflects and reinforces ableism."'},{n:'Reader',j:'Audience',q:'"I have never once seen my experience reflected in your paper."'}],b:0,why:'The editor is showing ableism through structural media exclusion.'},{p:[{n:'Director',j:'Film Executive',q:'"We cannot cast a Black woman as the lead, our international audience will not relate."'},{n:'Producer',j:'Film Producer',q:'"Films with diverse leads consistently outperform at the box office globally."'},{n:'Writer',j:'Screenwriter',q:'"That assumption is both inaccurate and harmful to the industry."'},{n:'Agent',j:'Talent Agency',q:'"Our clients of colour are repeatedly passed over based on exactly this logic."'}],b:0,why:'The director is expressing racial bias disguised as commercial reasoning.'},{p:[{n:'James',j:'Therapist',q:'"Have you considered that maybe you are misreading the situation at work?"'},{n:'Client',j:'Patient',q:'"This is the fourth time my manager has taken credit for my ideas in front of leadership."'},{n:'Supervisor',j:'Clinical Supervisor',q:'"The client account is detailed and consistent, it should be validated, not questioned."'},{n:'Colleague',j:'Fellow Therapist',q:'"Racial microaggressions in the workplace are extremely well documented."'}],b:0,why:'James is gaslighting his client.'},{p:[{n:'Karen',j:'HR Manager',q:'"We should mention she is a woman in the press release, it is a good look for us."'},{n:'Jerome',j:'Communications',q:'"Let us focus on her actual qualifications and achievements."'},{n:'Mia',j:'Marketing',q:'"Her work speaks for itself. That is the story."'}],b:0,why:'Karen is proposing tokenism.'},{p:[{n:'Steve',j:'Colleague',q:'"I do not see you as Black, you are just Steve to me."'},{n:'Alicia',j:'Team Lead',q:'"Steve brings great perspective to the team."'},{n:'Deon',j:'Designer',q:'"I would rather just be seen fully, including my race."'}],b:0,why:'Colorblind ideology, denying a core part of someone identity.'},{p:[{n:'Kevin',j:'Doctor',q:'"She is probably just anxious, it is very common in her demographic."'},{n:'Nurse Tanya',j:'RN',q:'"Her symptoms warrant a full workup before we conclude anything."'}],b:0,why:'Kevin is attributing symptoms to a demographic stereotype.'},{p:[{n:'Gary',j:'Teacher',q:'"I call on the boys more in maths, they just seem more confident."'},{n:'Ms. Osei',j:'Department Head',q:'"Research shows calling on boys more causes girls to lose confidence over time."'}],b:0,why:'Gary is describing gender bias in education.'},{p:[{n:'Phil',j:'Landlord',q:'"I just feel more comfortable renting to families like mine, you know how it is."'},{n:'Agent',j:'Property Manager',q:'"We need to consider all qualified applicants equally. That is the law."'}],b:0,why:'Phil is describing housing discrimination.'},{p:[{n:'Coach',j:'Sports Coach',q:'"I always put the white kids at quarterback, they are natural leaders."'},{n:'Assistant',j:'Assistant Coach',q:'"We should be selecting based on skill and work ethic, not race."'}],b:0,why:'The coach is showing racial stereotyping in sports leadership roles.'},{p:[{n:'HR Rep',j:'HR',q:'"She has an unusual name. Let us call her in just to check she is professional."'},{n:'Manager',j:'Hiring Manager',q:'"Her credentials are excellent. The name should not factor into this at all."'},{n:'Director',j:'Department Director',q:'"Name-based screening has been shown to disadvantage ethnic minority applicants dramatically."'}],b:0,why:'The HR rep is showing name-based racial bias in hiring.'},{p:[{n:'Exec',j:'Corporate',q:'"Our wellness program is for everyone but we will not make prayer room accommodations, it gets complicated."'},{n:'Employee A',j:'Muslim Staff Member',q:'"Prayer accommodations are a basic religious right, not a complication."'},{n:'Employee B',j:'HR Staff',q:'"Selective accommodation is discriminatory under employment law."'},{n:'Legal',j:'Legal Counsel',q:'"Failure to accommodate protected religious practice creates significant liability."'}],b:0,why:'The exec is showing religious discrimination by selectively excluding Muslim accommodation needs.'},{p:[{n:'Publisher',j:'Book Publisher',q:'"Books with Black main characters just do not sell as broadly. It is a market reality."'},{n:'Agent',j:'Literary Agent',q:'"Multiple studies show that claim is false and rooted in publisher assumptions, not reader preferences."'},{n:'Author A',j:'Black Author',q:'"I have heard this my entire career. It is a self-fulfilling prophecy built on bias."'},{n:'Author B',j:'White Author',q:'"The publishing industry consistently underinvests in promoting diverse books and then uses low sales as evidence."'},{n:'Reader',j:'Book Club Member',q:'"Some of the most popular books of the decade have been by and about Black people."'}],b:0,why:'The publisher is using structural racism in their own industry to justify perpetuating it.'}];

{id:'general',ic:'🌐',title:'What kind of bias learner are you?',desc:'10 questions to reveal how you tend to think, react, and grow around bias. No right or wrong answers, just honest ones.',col:'#f5f3ff',tc:'#5b21b6',personality:true,
qs:[{q:'You are in a meeting and someone says something that feels slightly off to you. What do you do?',o:['Speak up immediately','Make a mental note but say nothing','Mention it privately afterward','Wonder if you are reading too much into it']},{q:'A friend tells you they experienced racism at work. Your first instinct is:',o:['To believe them fully and ask how you can help','To ask questions to understand exactly what happened','To feel unsure, it is hard to know without being there','To feel uncomfortable and change the subject']},{q:'How often do you actively seek out perspectives from people whose lives look very different from yours?',o:['Regularly, I make a point of it','Sometimes, when it comes up naturally','Not often, but I would like to more','Rarely, my circle is pretty similar to me']},{q:'When you realise you have said something biased, what happens next?',o:['I apologise, reflect, and try to do better','I feel ashamed and overthink it for days','I minimise it, everyone makes mistakes','I get defensive, even if I know I was wrong']},{q:'Someone shares an article about systemic racism. You:',o:['Read it and think about how it applies to your life','Save it, intend to read it, probably do not','Skim it looking for things you disagree with','Feel like it does not apply to you personally']},{q:'How do you feel about conversations on bias and discrimination?',o:['I lean into them, they are important','I engage but find them draining','I participate but feel anxious about saying the wrong thing','I avoid them when I can']},{q:'When you notice you are making an assumption about someone based on how they look, you:',o:['Catch it and consciously challenge it','Notice it but let it pass','Only notice it if someone points it out','Do not usually notice it in the moment']},{q:'A colleague from a different background gets a promotion. Your gut reaction is:',o:['Great, they worked hard for it','Curious about how they got there','A flicker of "was that a diversity hire?" even if I feel bad about it','No reaction, I do not think about things that way']},{q:'How would you describe your approach to learning about bias?',o:['Active, I seek it out','Reactive, I engage when it comes up','Passive, I absorb what is around me','Resistant, I am skeptical of a lot of it']},{q:'Finishing this sentence honestly: "When it comes to bias, I am..."',o:['Still learning and genuinely trying','Aware but not always sure what to do about it','Curious but unsure where to start','Tired of talking about it, honestly']}],
results:[{range:[0,20],title:'The Awakening Learner',emoji:'🌱',body:'You are at the very beginning of this journey, and that is a completely valid place to be. Resistance or fatigue around these topics often means something worth exploring is sitting just beneath the surface. Together is exactly the kind of low-pressure place to start.'},{range:[21,45],title:'The Reflective Learner',emoji:'🪞',body:'You are aware, thoughtful, and genuinely willing to examine your own patterns, even when it is uncomfortable. You might not always know what to do with what you notice, but your honesty with yourself is the most important foundation. Keep going.'},{range:[46,70],title:'The Engaged Learner',emoji:'🔥',body:'You actively seek out learning and lean into difficult conversations. You notice bias, name it, and try to act on it. The next level for you is moving from awareness into consistent action, especially when it costs you something.'},{range:[71,100],title:'The Active Advocate',emoji:'✊',body:'You do not just understand bias intellectually, you work to disrupt it. You check your assumptions, believe people\'s experiences, and show up even when it is awkward. The challenge now is staying curious and avoiding the trap of thinking you have arrived.'}]},
{id:'racist',ic:'✊',title:'Am I racist?',desc:'Reflect honestly on your racial attitudes.',col:'#fef2f2',tc:'#991b1b',qs:[{q:'When you see a Black man walking toward you at night, what is your first instinct?',o:['Nothing, I do not notice','I feel slightly on guard','I actively cross the street','I feel completely comfortable']},{q:'When you hear someone speak with a foreign accent, do you assume they are less educated?',o:['Never','Occasionally, without meaning to','Often','I actively challenge that assumption']},{q:'When a person of colour gets a job, do you wonder if they were hired for diversity reasons?',o:['Never','Sometimes, briefly','Often','I catch myself and challenge that thought']},{q:'How often do you consume media created by people of colour?',o:['Regularly and intentionally','Occasionally','Rarely','I had not really thought about it']},{q:'If a friend made a racist joke, what would you do?',o:['Laugh along to avoid awkwardness','Stay silent','Call it out directly','Leave the situation']},{q:'Have you ever been surprised when a person of colour was highly articulate or successful?',o:['Yes, honestly','No, never','I am not sure','I have caught myself and felt ashamed']},{q:'Do you have close friends of a different race with whom you discuss real issues?',o:['Yes, several','One or two','Not really','No']},{q:'When you think about your neighbourhood being more racially diverse, how do you feel?',o:['Genuinely positive','Neutral','Slightly uncomfortable','I actively welcome it']},{q:'Have you done something specifically to learn about the history of people of a different race?',o:['Yes, regularly','Once or twice','No','I am doing it now']},{q:'When a person of colour describes an experience of racism, what is your first reaction?',o:['I believe them','I wonder if they are overreacting','I feel defensive','I listen and try to understand']}],results:[{range:[0,25],title:'Significant unconscious racial bias',body:'Your answers suggest you likely hold unconscious racial biases. This does not make you a bad person, it makes you human.'},{range:[26,55],title:'Some racial bias, awareness growing',body:'You show some awareness of racial bias but also patterns that suggest unconscious prejudice.'},{range:[56,80],title:'Actively working against racial bias',body:'Your answers suggest you are genuinely trying to examine and challenge your racial biases.'}]},
{id:'sexist',ic:'⚧️',title:'Am I sexist?',desc:'Examine your attitudes toward gender.',col:'#fdf2f8',tc:'#9d174d',qs:[{q:'When a woman is confident and assertive at work, what words come to mind?',o:['Leader, capable','Bossy, aggressive','Depends on the situation','The same words I would use for a man']},{q:'Do you find yourself taking women\'s opinions less seriously than men?',o:['Never','Sometimes without realising it','Yes, honestly','I actively work against this tendency']},{q:'When a woman complains about sexism, what is your first reaction?',o:['I believe her','I wonder if she is overreacting','I feel defensive','I try to listen and understand']},{q:'If a woman earns more than her male partner, how does that feel to you?',o:['Completely normal','Slightly odd','Uncomfortable','Ideal and fair']},{q:'Do you expect women to be warmer and more nurturing than men?',o:['No, never','Sometimes yes','Yes, generally','I catch this expectation and challenge it']},{q:'Have you ever assumed a woman got a job because of her looks or a relationship?',o:['Never','Once or twice','More than once','I have caught myself and felt ashamed']},{q:'When a woman expresses strong emotions at work, do you see it as unprofessional?',o:['No more than a man\'s emotions','Yes, honestly','It depends','I hold men and women to the same standard']},{q:'Do you believe women are naturally better suited to caregiving than men?',o:['No, these are socialised roles','Yes, generally','I am not sure','I believe individuals vary regardless of gender']},{q:'Have you ever talked over a woman in a meeting?',o:['Yes, probably','I do not think so','I actively make space for women to speak','I am not sure']},{q:'Do you consume media or follow women in your field at the same rate as men?',o:['Yes, intentionally','Probably less','I had not thought about it','I actively seek out women\'s perspectives']}],results:[{range:[0,25],title:'Significant gender bias present',body:'Your answers reveal attitudes consistent with gender bias.'},{range:[26,55],title:'Some sexist patterns, awareness growing',body:'You show some awareness of gender equality but also attitudes that reflect ingrained sexism.'},{range:[56,80],title:'Actively working against gender bias',body:'Your answers suggest you genuinely examine your gender attitudes.'}]},
{id:'ableist',ic:'♿',title:'Am I ableist?',desc:'Reflect on your attitudes toward disability.',col:'#f5f3ff',tc:'#5b21b6',qs:[{q:'When you meet someone in a wheelchair, do you automatically assume they cannot do certain things?',o:['Sometimes, honestly','No, I wait to learn what they can do','Yes, generally','I catch myself and correct it']},{q:'Have you ever spoken to a disabled person\'s companion instead of the person themselves?',o:['Yes, without thinking','No, never','I am not sure','I make a point of speaking directly to the person']},{q:'Do you use words like crazy, lame, or blind as negative descriptors?',o:['Yes, regularly','Occasionally without thinking','No, I avoid this','I have stopped after learning why it is harmful']},{q:'When you see a disabled person succeed at something difficult, do you feel unusually inspired?',o:['Yes, I find it very inspiring','No, I try not to treat their life as inspiration for me','Sometimes','I have reflected on why inspiration porn is problematic']},{q:'Do you assume people with mental health conditions are dangerous or unpredictable?',o:['Sometimes yes','No','I try to challenge this when it arises','I am not sure']},{q:'Have you ever felt impatient or frustrated when accommodating someone with a disability?',o:['Yes, honestly','No','Occasionally','I feel frustrated and then ashamed of myself']},{q:'Do you see accessibility features as special treatment rather than basic rights?',o:['Sometimes yes','No, they are rights','I had not thought about it that way','I actively advocate for accessibility']},{q:'When someone discloses a non-visible disability, do you doubt them?',o:['Sometimes','No','Honestly yes','I believe them and try to understand']},{q:'Have you ever made a joke that used disability as a punchline?',o:['Yes','No','Maybe without realising','I have done it and stopped after learning better']},{q:'Do you think about disability when designing spaces or events you create?',o:['No, not usually','Yes, always','I am starting to','Only when reminded']}],results:[{range:[0,25],title:'Significant ableist attitudes present',body:'Your answers suggest you hold habits that reflect ableism, often without meaning to.'},{range:[26,55],title:'Some ableist patterns, awareness building',body:'You have some awareness of disability rights but also ingrained habits.'},{range:[56,80],title:'Actively working against ableism',body:'Your answers suggest genuine commitment to disability inclusion.'}]},
{id:'ageist',ic:'🧓',title:'Am I ageist?',desc:'Examine your attitudes toward age.',col:'#fffbeb',tc:'#92400e',qs:[{q:'When an older colleague struggles with technology, what do you think?',o:['They should catch up','They probably have skills I lack in other areas','It is expected at their age','I offer help without judgment']},{q:'Do you make jokes about getting old or people being past it?',o:['Yes, fairly often','Occasionally','No','I used to but I stopped']},{q:'When an older person applies for a job you are hiring for, do you have concerns based on age alone?',o:['Honestly yes','No, I evaluate on merit','Sometimes unconsciously','I actively correct for this bias']},{q:'Do you find yourself speaking more slowly or loudly to older people without being asked?',o:['Yes, automatically','No','Sometimes','I try to follow their lead']},{q:'Have you ever dismissed an older person\'s opinion as out of touch?',o:['Yes','Sometimes','No','I have done this and caught myself']},{q:'Do you believe younger people are more valuable to a company than experienced older workers?',o:['Generally yes','No','It depends on the role','I think both offer different value']},{q:'How do you feel when older people use social media or technology confidently?',o:['Surprised','Normal, why would they not?','A little uncomfortable','Impressed in a way I realise is condescending']},{q:'Have you ever excluded an older person from a plan assuming they would not enjoy it?',o:['Yes','No','Maybe','I try to let people decide for themselves']},{q:'Do you think people should retire at a certain age regardless of their desire to work?',o:['Yes, generally','No, it should be their choice','I have not thought about it','I believe in individual autonomy around this']},{q:'Do you seek out the opinions and experiences of older people in your life?',o:['Not really','Yes, regularly','Sometimes','I am starting to more intentionally']}],results:[{range:[0,25],title:'Significant ageist attitudes present',body:'Your answers suggest you hold attitudes that reflect ageism.'},{range:[26,55],title:'Some ageist patterns, growing awareness',body:'You show some awareness but also ingrained assumptions about age.'},{range:[56,80],title:'Actively challenging ageism',body:'Your answers show a genuine effort to see people as individuals.'}]},
{id:'ally',ic:'🤝',title:'Am I a good ally?',desc:'Assess how effectively you support marginalised groups.',col:'#f0fdf4',tc:'#166534',qs:[{q:'When you witness a microaggression, what do you do?',o:['Nothing, I do not want conflict','Speak up in the moment','Check in with the person affected afterward','I freeze and feel guilty later']},{q:'Do you amplify the voices of marginalised people or take credit for their ideas?',o:['I am not sure','I consciously amplify','I take credit sometimes','I actively credit and elevate others']},{q:'When a marginalised friend tells you about discrimination, what do you do?',o:['Try to explain why it might not be bias','Listen and believe them','Share a similar story of my own','Ask how I can support them']},{q:'Do you engage in allyship when the marginalised person is not in the room?',o:['Not usually','Yes, always','Sometimes','This is something I am working on']},{q:'Have you done anything uncomfortable or costly to support someone from a marginalised group?',o:['No','Yes','I have wanted to but did not','Yes and it was worth it']},{q:'Do you educate yourself about issues facing marginalised groups without being asked to?',o:['No, I wait to be taught','Yes regularly','Sometimes','I am building this habit']},{q:'When you make a mistake around bias or inclusion, how do you respond?',o:['Get defensive','Apologise, learn, and do better','Feel ashamed and shut down','Acknowledge it briefly and move forward']},{q:'Do you use your privilege or platform to create access for others?',o:['Not really','Yes actively','I am not sure how','I am looking for ways to do this']},{q:'Have you ever stayed silent to avoid damaging your comfort or relationships?',o:['Yes, often','No','Sometimes','I am working on speaking up more consistently']},{q:'Do you check in with people you support to make sure your allyship is actually helpful?',o:['No','Yes regularly','Not often enough','This is something I want to do more']}],results:[{range:[0,25],title:'Passive bystander, allyship needs work',body:'Your answers suggest you have good intentions but are not consistently translating them into action.'},{range:[26,55],title:'Developing ally, making real progress',body:'You are doing some meaningful allyship but there are gaps between your values and your actions.'},{range:[56,80],title:'Active ally, keep growing',body:'Your answers show genuine, active allyship.'}]},
{id:'privilege',ic:'⚡',title:'How aware am I of my privilege?',desc:'Reflect on the advantages your identity gives you.',col:'#f5f3ff',tc:'#5b21b6',qs:[{q:'Have you ever had to think about whether your race would affect how you are treated by police?',o:['No, never','Yes, regularly','Occasionally','I have started thinking about this more']},{q:'Have you ever worried that a mistake at work would reflect badly on your entire racial or gender group?',o:['No','Yes, often','Sometimes','I have only started to realise this is others reality']},{q:'Can you see people who look like you in positions of leadership and power?',o:['Yes, easily','No, rarely','Sometimes','Yes and I am aware of what this means']},{q:'Have you ever had your competence questioned because of your race, gender, or background?',o:['No','Yes, frequently','Occasionally','I am aware others experience this while I do not']},{q:'Can you walk into most stores without being followed or watched?',o:['Yes, always','No','Sometimes','Yes and I understand not everyone can']},{q:'When you call about a job or apartment, do you worry your name will work against you?',o:['No','Yes','Sometimes','No and I recognise this is a real advantage']},{q:'Have you ever benefited from a network or opportunity tied to family wealth or connections?',o:['No','Yes','Possibly','Yes and I try to be honest about this']},{q:'When you make a mistake, do you generally get the benefit of the doubt?',o:['Yes, usually','No','Sometimes','Yes and I try to extend this to others']},{q:'Do you think about privilege regularly or does it feel abstract?',o:['Very abstract to me','I think about it often','Occasionally','It shapes how I try to act every day']},{q:'Do you use whatever privilege you have to create access for others?',o:['Not really','Yes actively','I try to','I am building habits around this']}],results:[{range:[0,25],title:'Limited awareness of privilege',body:'Your answers suggest privilege feels abstract or distant to you.'},{range:[26,55],title:'Growing awareness, putting it into practice',body:'You have real awareness of privilege but are still working out how to act on it.'},{range:[56,80],title:'Strong awareness and active responsibility',body:'Your answers show genuine, sustained awareness of privilege.'}]},
{id:'classist',ic:'💰',title:'Am I classist?',desc:'Reflect on class and wealth attitudes.',col:'#f0fdf4',tc:'#166534',qs:[{q:'When you learn someone did not go to college, do you make assumptions about their intelligence?',o:['Honestly yes','No','Sometimes','I try not to but it is a reflex']},{q:'Do you assume that people who are poor made bad choices?',o:['Generally yes','No, I understand structural causes','Sometimes','I have moved away from this view through learning']},{q:'How comfortable are you socialising with people from very different economic backgrounds?',o:['Somewhat uncomfortable','Very comfortable','I do not really get the chance','I actively seek it out']},{q:'Have you ever looked down on someone\'s job or lifestyle because it seemed low class?',o:['Yes honestly','No','Maybe without realising','I have done this and reflected on it']},{q:'Do you believe wealthy people are generally harder working than poor people?',o:['Yes generally','No','It is complicated','I understand that wealth is often inherited or structural']},{q:'When you see someone using food stamps or government assistance, what do you think?',o:['They should get a better job','Good, that is what the system is for','I feel uncomfortable','I support social safety nets fully']},{q:'Have you ever made a joke at the expense of people from lower-income backgrounds?',o:['Yes','No','Maybe','I did once and felt bad about it']},{q:'Do you think the school someone went to reflects their worth or intelligence?',o:['To some degree yes','No','It reflects opportunity not ability','I am working to separate prestige from quality']},{q:'Do you advocate for policies that help close the wealth gap?',o:['No','Yes actively','I have not thought much about it','I am still forming my view']},{q:'Do you have genuine friendships with people from very different class backgrounds?',o:['Not really','Yes','A few','I am trying to expand this']}],results:[{range:[0,25],title:'Significant classist attitudes present',body:'Your answers reveal attitudes that reflect classism.'},{range:[26,55],title:'Some classist patterns, awareness growing',body:'You show awareness of class issues but also ingrained assumptions.'},{range:[56,80],title:'Actively challenging classism',body:'Your answers suggest genuine awareness of class inequality.'}]},
{id:'homophobic',ic:'🏳️‍🌈',title:'Am I homophobic?',desc:'Reflect on your attitudes toward LGBTQ+ people.',col:'#eff6ff',tc:'#1d4ed8',qs:[{q:'When you see two men or two women holding hands in public, what do you feel?',o:['Uncomfortable','Completely normal','I notice it but it does not bother me','I actively celebrate visible LGBTQ+ love']},{q:'Do you believe being gay or lesbian is a choice?',o:['Yes','No, it is not a choice','I am not sure','No and I understand the harm this belief causes']},{q:'Have you ever used the word gay as a negative descriptor?',o:['Yes, still do','Yes but I stopped','No','I have done it and understand why it is harmful']},{q:'How do you feel about LGBTQ+ content in children\'s books or school curricula?',o:['It is inappropriate','It is important for representation','I am not sure','I support it fully']},{q:'Do you believe transgender people\'s gender identities are valid?',o:['No','Yes completely','I am still working through this','Yes and I actively use correct pronouns']},{q:'When someone comes out to you, what is your first instinct?',o:['To ask why or express concern','To affirm and support them','To feel awkward','To treat it as normal information']},{q:'Have you ever made assumptions about someone\'s personality based on them being LGBTQ+?',o:['Yes','No','Probably','I catch this and correct it']},{q:'Do you believe LGBTQ+ people deserve the same legal rights as everyone else?',o:['Not fully','Yes completely','In most cases','Yes and I actively support these rights']},{q:'How comfortable are you with LGBTQ+ people in your immediate social or family circle?',o:['Uncomfortable','Completely comfortable','It depends','I actively foster inclusive spaces']},{q:'Have you ever avoided or excluded someone because they were LGBTQ+?',o:['Yes','No','Not consciously','No and I would speak up if I saw it']}],results:[{range:[0,25],title:'Significant homophobia present',body:'Your answers suggest you hold attitudes harmful to LGBTQ+ people.'},{range:[26,55],title:'Some homophobic attitudes, reflection needed',body:'You show some openness but also attitudes that may cause harm.'},{range:[56,80],title:'Genuinely affirming and working on growth',body:'Your answers show a genuine commitment to LGBTQ+ inclusion and dignity.'}]},
{id:'religious',ic:'🙏',title:'Do I hold religious bias?',desc:'Reflect on attitudes toward different faiths.',col:'#fffbeb',tc:'#92400e',qs:[{q:'When you hear someone is Muslim, what is your first thought?',o:['Concerns about extremism','Nothing in particular','Curiosity about their culture','I notice my reaction and examine it']},{q:'Do you believe certain religions are more civilised or advanced than others?',o:['Yes','No','I am not sure','I actively challenge this hierarchy']},{q:'Have you ever made assumptions about someone\'s values based on their religion?',o:['Yes, often','No','Occasionally','I catch myself and correct it']},{q:'Do you think religious people are generally less rational than non-religious people?',o:['Yes','No','Sometimes','I try to separate faith from intelligence']},{q:'How do you feel about religious accommodations at work, prayer times, dress, diet?',o:['They are too much to ask','They are basic rights','It depends on the religion','I actively support them']},{q:'Have you ever treated someone differently because of their religious identity?',o:['Yes','No','Probably without realising','Yes and I have reflected on it']},{q:'Do you believe people of certain faiths are more likely to be violent?',o:['Yes','No','I am influenced by media on this','I actively challenge this assumption']},{q:'Have you ever made a joke that used someone\'s religion as the punchline?',o:['Yes','No','Maybe','I used to and stopped']},{q:'Do you engage with people of different faiths in genuine, curious conversation?',o:['No','Yes regularly','Occasionally','I am building this practice']},{q:'When a religious practice is different from yours, what is your first reaction?',o:['Judgment or discomfort','Curiosity','Neutral','Genuine interest and respect']}],results:[{range:[0,25],title:'Significant religious bias present',body:'Your answers suggest you hold attitudes of religious bias.'},{range:[26,55],title:'Some religious bias, growing awareness',body:'You show some openness but also ingrained assumptions.'},{range:[56,80],title:'Genuinely open to religious diversity',body:'Your answers show real openness and curiosity toward religious difference.'}]}

function pc(){return S.primaryColor||'#7C3AED';}
function lTier(l){return l<=10?'tier1':l<=20?'tier2':l<=30?'tier3':l<=40?'tier4':'tier5';}
function lCol(l){if(l<=10)return{c:'#16a34a',bg:'#f0fdf4',n:'Beginner'};if(l<=20)return{c:'#0369a1',bg:'#f0f9ff',n:'Elementary'};if(l<=30)return{c:'#92400e',bg:'#fffbeb',n:'Intermediate'};if(l<=40)return{c:'#4c1d95',bg:'#f5f3ff',n:'Advanced'};return{c:'#be123c',bg:'#fff1f2',n:'Master'};}
function iCnt(l){return l<=10?2:l<=20?3:l<=30?4:l<=40?5:5;}
function iCol(l){if(l<=10)return{c:'#16a34a',bg:'#f0fdf4'};if(l<=20)return{c:'#0369a1',bg:'#f0f9ff'};if(l<=30)return{c:'#92400e',bg:'#fffbeb'};if(l<=40)return{c:'#4c1d95',bg:'#f5f3ff'};return{c:'#be123c',bg:'#fff1f2'};}
function qTier(d){return d<=10?'easy':d<=30?'medium':'hard';}
function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function pqScore(answers,qz){
  if(qz.personality){var t=0;answers.forEach(function(i){t+=[10,7,4,1][i]||1;});return t;}
  var t=0;answers.forEach(function(i){t+=[0,4,7,10][i]||0;});return t;
}
function pqResult(answers,qz){
  var sc=pqScore(answers,qz);
  var mx=qz.qs.length*(qz.personality?10:10);
  var pct=Math.round(sc/mx*100);
  var res=qz.results[0];
  if(qz.personality){qz.results.forEach(function(r){if(sc>=r.range[0]&&sc<=r.range[1])res=r;});}
  else{qz.results.forEach(function(r){if(pct>=r.range[0]&&pct<=r.range[1])res=r;});}
  return res;
}
function shuffleQ(raw){var pairs=raw.a.map(function(t,i){return{text:t,correct:i===0};});for(var i=pairs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pairs[i];pairs[i]=pairs[j];pairs[j]=t;}return{q:raw.q,e:raw.e,opts:pairs};}
function getLB(l){try{var s=localStorage.getItem('lb_'+l);return s?JSON.parse(s):[];}catch(e){return S.leaderboards[l]||[];}}
function saveLB(l,e){try{localStorage.setItem('lb_'+l,JSON.stringify(e));}catch(er){}S.leaderboards[l]=e;}
function addToLB(l,n,t){var e=getLB(l);e.push({name:n,time:t,date:new Date().toLocaleDateString()});e.sort(function(a,b){return a.time-b.time;});e=e.slice(0,10);saveLB(l,e);return e;}

function applyA11y(){
  var a=S.a11y||{};
  var b=document.body;
  // High contrast via !important style tag
  var hcId='a11y-hc-style';var hcEl=document.getElementById(hcId);if(hcEl)hcEl.remove();
  if(a.hc){
    var shc=document.createElement('style');shc.id=hcId;
    shc.textContent='body,#app{background:#000!important;color:#fff!important}'
      +'.card{background:#111!important;border:1px solid #fff!important;color:#fff!important}'
      +'.btns{background:#222!important;color:#fff!important;border-color:#fff!important}'
      +'#quickbar{background:#000!important;border-bottom:2px solid #fff!important}'
      +'input,select{background:#111!important;color:#fff!important;border-color:#fff!important}'
      +'#nav button{background:#111!important;color:#fff!important;border-color:#555!important}';
    document.head.appendChild(shc);
  }
  var h=document.documentElement;
  // Dyslexia font - set on html so inherit cascades everywhere
  h.style.fontFamily=a.dys?"OpenDyslexic,Comic Sans MS,Arial,sans-serif":"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif";
  // Also inject a style tag to force override any remnant inline styles
  var dysId='together-dys-style';var existingDys=document.getElementById(dysId);if(existingDys)existingDys.remove();
  if(a.dys){var sd=document.createElement('style');sd.id=dysId;sd.textContent='*{font-family:Arial,Verdana,"Trebuchet MS",sans-serif!important;letter-spacing:0.05em!important;word-spacing:0.15em!important;line-height:1.8!important}i,em{font-style:normal!important}.card{background:#fffef8!important}';document.head.appendChild(sd);}
  // Letter spacing - inject style tag to override * rule
  var lsId='together-ls-style';var existingLs=document.getElementById(lsId);if(existingLs)existingLs.remove();
  if(a.ls){var sl=document.createElement('style');sl.id=lsId;sl.textContent='*{letter-spacing:0.07em!important;word-spacing:0.12em!important;line-height:2!important}';document.head.appendChild(sl);}
  // High contrast
  if(a.hc){
    document.documentElement.style.setProperty('--bg','#000');
    document.documentElement.style.setProperty('--txt','#fff');
    document.documentElement.style.setProperty('--border','#fff');
    b.style.background="#000";
    b.style.color="#fff";
    // Make all cards dark
    document.querySelectorAll('.card').forEach(function(el){el.style.background='#111';el.style.borderColor='#fff';el.style.color='#fff';});
    document.querySelectorAll('.btns').forEach(function(el){el.style.background='#222';el.style.color='#fff';el.style.borderColor='#fff';});
  } else {
    b.style.background="";b.style.color="";
    document.querySelectorAll('.card').forEach(function(el){el.style.background='';el.style.borderColor='';el.style.color='';});
    document.querySelectorAll('.btns').forEach(function(el){el.style.background='';el.style.color='';el.style.borderColor='';});
  }
  // Reduce motion
  var styleId='together-motion-style';
  var existing=document.getElementById(styleId);
  if(existing)existing.remove();
  if(a.motion){
    var s=document.createElement('style');s.id=styleId;
    s.textContent='*{animation:none!important;transition:none!important}';
    document.head.appendChild(s);
  }
  // Large tap targets
  var tapId='together-tap-style';
  var existingTap=document.getElementById(tapId);
  if(existingTap)existingTap.remove();
  if(a.taps){
    var s2=document.createElement('style');s2.id=tapId;
    s2.textContent='.btns,.btnp,.ans,.gbtn,.ccard{min-height:52px!important;padding-top:12px!important;padding-bottom:12px!important;font-size:14px!important}';
    document.head.appendChild(s2);
  }
  // Font size via plain language — also simplify labels
  var plainId='together-plain-style';
  var existingPlain=document.getElementById(plainId);
  if(existingPlain)existingPlain.remove();
  if(a.plain){
    var s3=document.createElement('style');s3.id=plainId;
    s3.textContent='body{font-size:16px!important} .card div{font-size:15px!important}';
    document.head.appendChild(s3);
  }
}
function changeLanguage(code){
  S.lang=code;
  // Use Google Translate cookie method - works on served pages
  // For local files, open Google Translate with the page
  if(code==='en'){
    // Remove any translation
    var cookie=document.cookie;
    document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
    document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.'+location.hostname;
    // Try using the GTranslate API if loaded
    if(window.google&&window.google.translate){
      var sel=document.querySelector('.goog-te-combo');
      if(sel){sel.value='en';sel.dispatchEvent(new Event('change'));}
    }
  } else {
    // Set cookie for Google Translate
    document.cookie='googtrans=/en/'+code+'; path=/';
    document.cookie='googtrans=/en/'+code+'; path=/; domain=.'+location.hostname;
    // Try GTranslate API
    if(window.google&&window.google.translate){
      var sel=document.querySelector('.goog-te-combo');
      if(sel){sel.value=code;sel.dispatchEvent(new Event('change'));}
    }
    // If on a local file, show a message and offer to open in Google Translate
    if(location.protocol==='file:'){
      var lang=LANGS.filter(function(l){return l.code===code;})[0];
      var langName=lang?lang.name:'the selected language';
      if(confirm('To translate Together into '+langName+', it needs to be opened on a web server.\n\nWould you like to open this page in Google Translate instead?')){
        var encoded=encodeURIComponent(location.href);
        window.open('https://translate.google.com/translate?sl=en&tl='+code+'&u='+encoded,'_blank');
      }
    }
  }
  renderContent();
}

function startLadder(){var ni=document.getElementById('lni');var nm=(ni?ni.value.trim():'')||'Anonymous';S.lPlayerName=nm;S.lTime=0;S.lShuffled=shuffleQ(S.lPool[0]);S.game='lp';renderContent();stopTimer();if(!(S.a11y&&S.a11y.notimer)){if(!(S.a11y&&S.a11y.notimer)){timerInterval=setInterval(function(){S.lTime++;var td=document.getElementById('td');if(td)td.textContent=lCol(S.lLvl).n+' · ⏱ '+fmtTime(S.lTime);},1000);}}}
function AL_new(i){if(S.lAns)return;S.lAns=true;S.lPkIdx=i;var q=S.lShuffled;var correct=q.opts[i].correct;S.lLastCorrect=correct;if(correct){S.lRung=Math.min(5,S.lRung+1);S.lAnim='cl';S.xp+=S.lLvl*3;}else{S.lAnim='fall';S.lRung=Math.max(0,S.lRung-1);S.xp+=1;}renderContent();setTimeout(function(){S.lAnim=null;renderContent();},700);}
function NL_new(){if(!S.lAns)return;S.lAns=false;S.lPkIdx=-1;S.lLastCorrect=false;S.lQI++;S.lAnim=null;S.lShuffled=shuffleQ(S.lPool[S.lQI%S.lPool.length]);if(S.lRung>=5){stopTimer();S.lDone[S.lLvl]=true;S.gm++;S.lXP=S.lLvl*15;S.xp+=S.lXP;addToLB(S.lLvl,S.lPlayerName,S.lTime);S.game='l-done';}renderContent();}
function quitLadder(){stopTimer();S.game='ll';renderContent();}
function SI(l){S.iLvl=l;S.iAns=false;S.iPk=-1;S.game='ip';renderContent();}
function AI(i){if(S.iAns)return;S.iAns=true;S.iPk=i;if(i===CASES[(S.iLvl-1)%CASES.length].b){S.xp+=Math.ceil(S.iLvl/2)*2;}else{S.xp+=1;}renderContent();}
function NI(){if(!S.iAns)return;S.iDone[S.iLvl]=true;S.iXP=Math.ceil(S.iLvl/2)*2;S.gm++;S.game='i-done';renderContent();}
function resetProgress(){if(!confirm('Reset all progress?'))return;stopTimer();S.xp=0;S.ls=0;S.qz=0;S.gm=0;S.kDone={};S.iDone={};S.lDone={};S.kSc=0;S.kI=0;S.kAns=false;S.kPk=-1;S.lRung=0;S.lAns=false;S.lPkIdx=-1;S.lQI=0;S.lPool=[];S.lShuffled=null;S.lTime=0;S.quiz='pick';S.pqId=null;S.pqI=0;S.pqA=[];S.game='pick';S.tab='home';LESSONS.forEach(function(l){S['open_'+l.id]=false;S['xp_'+l.id]=false;if(S.vidPlaying)S.vidPlaying[l.id]=false;});render();}
function changeLang(code){
  if(!code) return;
  // Use Google Translate URL redirect approach — works in any browser
  var url = 'https://translate.google.com/translate?sl=en&tl='+code+'&u='+encodeURIComponent(window.location.href);
  window.open(url, '_blank');
}
render();
