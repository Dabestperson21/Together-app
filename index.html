<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:inherit}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}body{background:var(--color-background-tertiary);min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:460px;background:var(--color-background-primary);min-height:100vh;display:flex;flex-direction:column;box-shadow:0 0 30px rgba(0,0,0,.06)}
#hdr{padding:14px 16px 8px;text-align:center;border-bottom:0.5px solid rgba(0,0,0,.06)}
#nav{display:flex;gap:3px;padding:8px 10px;border-bottom:0.5px solid rgba(0,0,0,.06);flex-wrap:wrap}
#nav button{flex:1;min-width:44px;padding:5px 2px;font-size:9px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;font-family:inherit;line-height:1.3;text-align:center;transition:background .15s}
#nav button.on{color:#fff}
#cnt{flex:1;padding:12px;overflow-y:auto}
.card{border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:13px;margin-bottom:9px;background:var(--color-background-primary)}
.btnp{padding:8px 14px;font-size:12px;border:none;border-radius:6px;color:#fff;cursor:pointer;font-weight:600;font-family:inherit}
.btns{padding:8px 14px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);cursor:pointer;color:var(--color-text-primary);font-family:inherit}
.gbtn{width:100%;border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:13px;cursor:pointer;background:var(--color-background-primary);display:flex;align-items:center;gap:12px;margin-bottom:8px;text-align:left;font-family:inherit}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ccard{border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:11px;cursor:pointer;background:var(--color-background-primary);text-align:left;font-family:inherit}
.srow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.srow:last-child{border-bottom:none}
.pill{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px}
.ans{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;font-size:13px;border:1.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-primary);text-align:left;cursor:pointer;margin-bottom:8px;color:var(--color-text-primary);line-height:1.5;font-family:inherit}
.ltr{display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:#ede9fb;font-size:11px;font-weight:700;flex-shrink:0}
@keyframes cl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fl{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(60px) rotate(85deg);opacity:0}}
</style>
<style>
/* Hide Google Translate toolbar clutter */
.goog-te-banner-frame{display:none!important}
.goog-te-gadget{font-size:0!important;color:transparent!important}
.goog-te-gadget select{font-size:13px!important;color:#111!important;background:#fff!important;border:1px solid #ddd!important;border-radius:8px!important;padding:7px 10px!important;width:100%!important;cursor:pointer!important;font-family:inherit!important}
body{top:0!important}
#goog-te-banner-frame{display:none!important}
</style>

</head>

{id:'lx1',pill:'Foundations',pbg:'#f5f3ff',ptc:'#5b21b6',title:'What is implicit bias?',sub:'Unconscious attitudes that shape our decisions.',body:'Implicit bias means attitudes or stereotypes that affect our decisions without us realising. We all have them, they start forming in childhood. They show up in hiring, healthcare, school, and everyday conversations. Awareness is the first step to change.',vid:'guqFrhtwdSA',vtitle:'Implicit Bias explained (2 min)',points:['Everyone has implicit bias, it is not about being a bad person','Your brain creates shortcuts to process info fast, bias is a side effect','It affects hiring, healthcare, education, and daily life','Naming it is the first step to changing it']},
{id:'lx2',pill:'History',pbg:'#f0fdf4',ptc:'#166534',title:'The civil rights movement',sub:'How ordinary people changed the law.',body:'The American Civil Rights Movement (1954, 1968) used nonviolent protest, legal battles, and mass organising to dismantle legal segregation. Led by figures like Dr. Martin Luther King Jr., Rosa Parks, and John Lewis, and millions of ordinary people, it changed what America said it stood for.',vid:'Oig0FiGaPyU',vtitle:'The Civil Rights Movement (2 min animated)',points:['Nonviolent protest was a deliberate strategic choice','The Montgomery Bus Boycott (1955) showed collective action works','The Civil Rights Act (1964) changed the law, but not attitudes overnight','Young people and kids were central to the movement']},
{id:'lx3',pill:'Culture',pbg:'#fdf2f8',ptc:'#9d174d',title:'Microaggressions explained',sub:'Small comments that carry big impact.',body:'Microaggressions are subtle, often unintentional comments or actions that communicate bias. Individually they might seem small. But they add up. Research shows repeated microaggressions cause real psychological and even physical harm.',vid:'e4N50b76cZc',vtitle:'How microaggressions are like mosquito bites (2 min)',points:['One mosquito bite is annoying, a thousand is dangerous, same with microaggressions','Intent does not determine impact, "I did not mean it" does not erase harm','Examples: "You are so articulate!", "Where are you REALLY from?"','You do not have to intend harm to cause it']},
{id:'lx4',pill:'Identity',pbg:'#fffbeb',ptc:'#92400e',title:'Intersectionality',sub:'How overlapping identities create unique experiences.',body:'Coined by legal scholar Kimberle Crenshaw, intersectionality describes how race, gender, class, sexuality and other identities overlap. A Black woman\'s experience of discrimination is not simply "racism" plus "sexism", it is something distinct that neither lens alone can capture.',vid:'w6dnj2IyYjE',vtitle:'Kimberle Crenshaw defines intersectionality (2 min)',points:['Identities do not exist separately, they interact and compound','Anti-discrimination law often fails people with multiple marginalised identities','The term came from Crenshaw\'s work on Black women\'s workplace cases','It is a lens for seeing, not a competition over who suffers most']}

var QS2={"general":{"t1":[{"t":"What does bias mean?","o":["Unfairly favouring one thing over another","A type of food","A sport","A school subject"],"e":"Bias means unfairly preferring one person or group over another."},{"t":"Can you have a bias without knowing it?","o":["Yes, called unconscious bias","No you always know","Only adults can","Only at work"],"e":"Unconscious bias is very common and affects everyone."},{"t":"What does inclusion mean?","o":["Making everyone feel welcome and valued","Leaving people out","Only including friends","Ignoring differences"],"e":"Inclusion means actively making sure every person feels respected."},{"t":"What is a stereotype?","o":["An oversimplified belief applied to everyone in a group","A scientific fact","A helpful shortcut","A music player"],"e":"Stereotypes reduce complex people to oversimplified assumptions."},{"t":"What does diversity mean?","o":["A variety of different identities and backgrounds","Everyone being the same","A school subject","A type of food"],"e":"Diversity means having a range of different people and perspectives."},{"t":"What does equity mean?","o":["Giving everyone what they need to have a fair chance","Giving everyone the exact same thing","Being polite","A financial term"],"e":"Equity accounts for different starting points. Equality does not."},{"t":"What is prejudice?","o":["A negative judgment made before knowing the facts","Being careful","A type of crime","Being fair"],"e":"Prejudice means pre-judging someone without real evidence."},{"t":"What is discrimination?","o":["Treating someone unfairly because of who they are","Noticing differences","Being selective about food","Giving equal treatment"],"e":"Discrimination means treating someone worse because of their identity."}],"t2":[{"t":"What is the difference between equality and equity?","o":["Equality gives the same; equity gives what each person needs","They mean the same thing","Equality is always better","Equity is about money"],"e":"Equity accounts for different starting points."},{"t":"What is implicit bias?","o":["An unconscious attitude that affects decisions without our awareness","A bias you choose to have","A legal term","A type of test"],"e":"Implicit bias operates below conscious awareness."},{"t":"What is tokenism?","o":["Including one person from a minority group for appearances only","True diversity","A form of respect","Being welcoming"],"e":"Tokenism uses one person as a symbol without real change."},{"t":"What is confirmation bias?","o":["Seeking information that confirms what you already believe","Double-checking facts","Being thorough","A scientific method"],"e":"Confirmation bias: we naturally seek information confirming existing beliefs."},{"t":"What is the halo effect?","o":["One positive quality makes us assume someone is good overall","A religious experience","A type of sun glare","Being angelic"],"e":"The halo effect: one positive trait creates an overall positive impression."},{"t":"What is affinity bias?","o":["Unconsciously favouring people similar to yourself","Liking your friends","Being loyal","A type of friendship"],"e":"Affinity bias means we favour people who remind us of ourselves."},{"t":"What is allyship?","o":["Actively supporting marginalised people even when you are not from their group","A military alliance","Being nice to friends","Signing a contract"],"e":"Allyship means using your privilege to support people facing discrimination."},{"t":"What is a microaggression?","o":["A subtle comment that communicates bias often unintentionally","A small fight","A computer virus","A legal term"],"e":"Microaggressions are everyday slights that communicate bias."}],"t3":[{"t":"What is intersectionality?","o":["Overlapping identities create unique forms of discrimination","All discrimination is the same","A legal concept","A road junction"],"e":"Intersectionality was coined by Kimberle Crenshaw."},{"t":"What is survivorship bias?","o":["Focusing on successes while ignoring failures making barriers seem smaller","Bias only survivors have","A medical condition","Being good at surviving"],"e":"Survivorship bias uses exceptional success stories to deny that barriers exist."},{"t":"What is the just-world hypothesis?","o":["Believing the world is fair so victims must deserve what happens to them","The world is actually fair","A legal principle","A philosophical ideal"],"e":"The just-world hypothesis causes us to blame victims."},{"t":"What is gaslighting in the context of bias?","o":["Making someone doubt their own experience of discrimination","Using gas lighting at home","A type of argument","Being persuasive"],"e":"Gaslighting causes people to question their own valid perceptions."},{"t":"What is tone policing?","o":["Criticising how someone expresses feelings rather than addressing the discrimination","Fixing a playlist","A workplace rule","A music technique"],"e":"Tone policing shifts focus from the injustice to how the person raises it."},{"t":"What is moral licensing?","o":["A past good action gives unconscious permission to act less ethically","Having a license to be moral","Being overly moralistic","A legal concept"],"e":"Moral licensing is dangerous because it is unconscious."},{"t":"What is the model minority myth?","o":["Stereotyping a group as uniformly successful to dismiss discrimination","A positive recognition","An accurate observation","A compliment"],"e":"The model minority myth denies discrimination and divides communities."},{"t":"What is pluralistic ignorance?","o":["Everyone privately disagrees with a norm but publicly goes along assuming others agree","Shared ignorance","Being uninformed as a group","Political confusion"],"e":"Pluralistic ignorance explains why biased behaviour persists even when everyone is privately uncomfortable."}],"t4":[{"t":"What is epistemic injustice?","o":["Wronging someone in their capacity as a knower by dismissing their account","Unfair legal processes","A philosophical debate","Scientific bias"],"e":"Epistemic injustice occurs when testimony is dismissed because of who the speaker is."},{"t":"What is colorblind ideology?","o":["Believing ignoring race promotes equality while actually denying lived experiences of racism","Not seeing colours","Being racially neutral","A helpful approach"],"e":"Colorblind ideology prevents acknowledgment of real racial inequities."},{"t":"What is stereotype threat?","o":["Awareness of a negative stereotype about your group impairs your actual performance","Being threatened by stereotypes","Fear of assumptions","Peer pressure"],"e":"Stereotype threat is self-fulfilling."},{"t":"What is structural bias?","o":["Systems and policies that produce unequal outcomes even without individual intent","Everyone in a system being biased","A type of building","Intentional discrimination"],"e":"Structural bias does not require any individual to hold prejudiced beliefs."},{"t":"What is interest convergence?","o":["Civil rights advances occur only when they also serve the dominant group interests","When interests align by chance","A business concept","A legal principle"],"e":"Derrick Bell's interest convergence thesis argues gains happen when they benefit dominant groups too."},{"t":"What is covering in workplace inclusion?","o":["Downplaying a stigmatised identity in professional settings to avoid discrimination","Hiding physical features","A type of promotion","Wearing appropriate clothing"],"e":"Research shows most people from marginalised groups engage in covering at significant psychological cost."},{"t":"What is benevolent prejudice?","o":["Seemingly positive attitudes that still reinforce harmful group hierarchies","Being kind to everyone","A mild form of prejudice","Giving compliments"],"e":"Benevolent prejudice sounds positive but reinforces stereotypes and inequality."},{"t":"What is lateral violence?","o":["When members of a marginalised group direct aggression toward each other rather than the oppressive system","Violence between groups","An intergroup conflict","Physical violence"],"e":"Lateral violence is understood as internalised oppression turned outward."}],"t5":[{"t":"What distinguishes prejudice, discrimination, and oppression as a system?","o":["Prejudice is attitude, discrimination is action, oppression combines both with institutional power","They all mean the same","Prejudice is the worst","Oppression is just strong prejudice"],"e":"Oppression requires systemic power which is why individuals from marginalised groups cannot oppress dominant groups in the same structural sense."},{"t":"How does intersectional invisibility operate?","o":["People with multiple subordinate identities are overlooked because they do not fit the prototype of any single marginalised group","Being invisible to authorities","Having a passing privilege","Avoiding attention"],"e":"Black women may be excluded from both gender and race protections built around different reference points."},{"t":"What is epistemic violence?","o":["The active destruction of the knowledge systems of marginalised groups","A form of physical violence","The same as epistemic injustice","A philosophical debate"],"e":"Epistemic violence goes beyond dismissing testimony and erases entire knowledge systems."},{"t":"What is the normality of whiteness?","o":["Whiteness functions as an invisible default making everything else marked as different","White people being normal","A biological claim","A description of white culture"],"e":"When whiteness is the default all other identities are constructed as deviant embedding racial hierarchy into language and institutions."},{"t":"Why does diversity without inclusion often fail?","o":["Representation without belonging means marginalised people experience tokenism exhaustion and higher attrition","Diversity initiatives are too expensive","Companies are not trying hard enough","Diversity targets are too high"],"e":"You can have diverse representation while still having an environment where marginalised people do not feel safe or valued."},{"t":"What is anticipatory racism?","o":["The way people of colour adjust behaviour in advance to manage racism they expect to encounter","Predicting who will be racist","Preventing racist incidents","A form of paranoia"],"e":"Anticipatory racism has real psychological and physiological costs and often goes unrecognised as ongoing racial harm."},{"t":"What is the bootstrap myth in the context of structural inequality?","o":["The belief that individuals can overcome any structural disadvantage through effort alone obscuring systemic barriers","A true description of success","A neutral observation about work ethic","A motivational framework"],"e":"The bootstrap myth ignores structural inequality and is used to justify cutting support systems and blaming victims."},{"t":"What is diagnostic overshadowing in healthcare?","o":["When a patient identity becomes a catch-all explanation that prevents proper diagnosis","A type of misdiagnosis","A difficult medical test","A lighting issue"],"e":"Diagnostic overshadowing causes doctors to attribute unrelated symptoms to a patient background causing serious harm."}]},"racism":{"t1":[{"t":"What is racism?","o":["Treating someone unfairly because of their race","Disliking a sport","A competition","A food preference"],"e":"Racism is prejudice or discrimination based on race."},{"t":"What is a racial stereotype?","o":["An oversimplified belief about a racial group applied to all its members","A fact about race","A helpful generalisation","A scientific finding"],"e":"Racial stereotypes reduce complex people to oversimplified assumptions."},{"t":"Is racism only about personal hatred?","o":["No it can be unconscious or built into systems","Yes only hateful people are racist","Only if you use slurs","Only deliberate acts count"],"e":"Racism operates at personal cultural and institutional levels."},{"t":"What is colorism?","o":["Treating people differently based on how light or dark their skin is","Liking certain colours","A painting technique","Skin care"],"e":"Colorism favours lighter-skinned people over darker-skinned ones."},{"t":"What does systemic racism mean?","o":["Systems and policies produce racially unequal outcomes even without racist intent","Every person in the system is racist","A conspiracy theory","Racism is everywhere equally"],"e":"Systemic racism operates through structures not just individual attitudes."},{"t":"What is racial profiling?","o":["Using race as a reason to suspect someone of wrongdoing","Studying different races","A police training method","Being observant"],"e":"Racial profiling assumes criminality based on race rather than specific behaviour."},{"t":"What is a racial microaggression?","o":["A subtle comment that communicates racial bias often unintentionally","A small fight about race","A legal term","A type of racism only minorities experience"],"e":"Racial microaggressions are everyday slights that communicate bias."},{"t":"What is internalized racism?","o":["When a person of colour absorbs and accepts negative stereotypes about their own group","Being racist toward yourself","A form of self-hatred","A psychological disorder"],"e":"Internalised racism happens when people absorb negative stereotypes about their own racial group."}],"t2":[{"t":"A hiring manager keeps picking candidates with white-sounding names. This is likely:","o":["Name-based racial bias","Good recruiting","Random chance","Being thorough"],"e":"Research shows resumes with white-sounding names get significantly more callbacks."},{"t":"Pointing to one successful person of colour as proof racism is over is an example of:","o":["Survivorship bias","Good evidence","A fair argument","Historical progress"],"e":"Survivorship bias uses exceptional cases to deny systemic patterns."},{"t":"What is colorblind racism?","o":["Claiming not to see race while ignoring real racial inequalities","Being racially neutral","A positive approach","Not having biases"],"e":"Colorblind racism denies the reality of racial inequity by refusing to acknowledge race."},{"t":"Why is using historical crime data to target police patrols problematic?","o":["The data reflects past over-policing creating a self-reinforcing feedback loop","Historical data is reliable","Police need data to work","Crime is actually higher in those areas"],"e":"Using arrest data shaped by discriminatory policing creates a cycle that justifies more policing."},{"t":"What is racial battle fatigue?","o":["The cumulative psychological stress people of colour experience from constant encounters with racism","Being tired of talking about race","A medical condition","Being overly sensitive"],"e":"Racial battle fatigue describes the real documented toll that chronic exposure to racism takes."},{"t":"What is redlining?","o":["The historical practice of denying mortgages to residents of minority neighbourhoods","A financial product","A mapping technique","A building code"],"e":"Redlining systematically denied wealth-building opportunities to Black families for decades."},{"t":"What is the school-to-prison pipeline?","o":["A pattern where school disciplinary practices disproportionately affecting students of colour lead toward criminal justice involvement","A theory about careers","A school programme","A type of reform school"],"e":"Research shows Black students are disciplined more harshly for the same behaviours as white students."},{"t":"What is aversive racism?","o":["When people who believe they are non-racist still hold negative unconscious racial associations","Being openly against racism","Avoiding racists","Open hostility disguised as politeness"],"e":"Aversive racism is insidious because those who hold it do not see themselves as biased."}],"t3":[{"t":"A doctor dismisses a Black patient pain as probably stress. This reflects:","o":["Racial bias in healthcare rooted in false beliefs about biological differences","Good clinical judgment","Standard medical practice","The patient being difficult"],"e":"Medical racial bias is well-documented and causes serious harm including undertreated pain."},{"t":"What is double consciousness as described by W.E.B. Du Bois?","o":["The sense of always looking at oneself through the eyes of a racist society creating a divided self","Having two personalities","A philosophical concept with no practical relevance","Being biracial"],"e":"Du Bois described the psychological burden of navigating a society that sees you through a lens of racism."},{"t":"What is racial gaslighting?","o":["When institutions and individuals deny the experiences and realities of racism faced by people of colour","Being gaslit by a racist person","A political strategy","Personal manipulation"],"e":"Racial gaslighting operates at both personal and societal levels."},{"t":"What primarily caused the racial wealth gap historically?","o":["Discriminatory policies like redlining and exclusion from GI Bill benefits","Natural differences in ambition","Individual financial choices","Differences in education alone"],"e":"The racial wealth gap is primarily the result of deliberate exclusionary policies not individual choices."},{"t":"Why is representation in media important in the context of racism?","o":["Representation shapes who is seen as fully human capable and normal affecting everything from hiring to criminal justice","It is just entertainment","Representation is only cosmetic","It matters only for children"],"e":"Media representation shapes implicit associations that affect real-world outcomes."},{"t":"What is environmental racism?","o":["The disproportionate exposure of communities of colour to environmental hazards like pollution","Racism in the context of nature","A theory about climate change","Racism against people who like nature"],"e":"Environmental racism reflects how racial inequity shapes which communities bear the costs of pollution."},{"t":"What is the paradox of racial progress?","o":["Visible racial progress can obscure ongoing structural inequality and reduce pressure for systemic change","Racism gets worse over time","Progress is always real","Progress is always an illusion"],"e":"The appearance of progress can make it harder to address the deeper structural problems that remain."},{"t":"What does research on racial disparities in pain treatment reveal?","o":["Black patients are systematically undertreated for pain partly due to false beliefs about biological racial differences","Doctors always treat patients equally","Pain differences are biological","Black patients prefer less treatment"],"e":"Studies show Black patients receive less pain medication than white patients with identical conditions."}],"t4":[{"t":"What is structural racism distinct from individual racism?","o":["Systems policies and norms that produce racially unequal outcomes even without individual racist intent","When most individuals are racist","A specific legal category","Something only in some countries"],"e":"Structural racism does not require any individual to hold racist beliefs — it operates systemically."},{"t":"What did Derrick Bell mean by interest convergence?","o":["Racial equality advances primarily when it also serves the interests of white Americans","When different groups find common ground","A legal concept","A negotiation strategy"],"e":"Bell argued that civil rights gains tend to happen when they also benefit the dominant group."},{"t":"Why do some scholars criticise implicit bias training as insufficient?","o":["Because changing individual attitudes does not change the structures that produce unequal outcomes","Because bias does not exist","Because people do not pay attention","Because it is too expensive"],"e":"Individual attitude change without structural change has limited impact on systemic inequality."},{"t":"What is racial capitalism?","o":["The argument that capitalism has always relied on racial hierarchies and the exploitation of racialised labour","That capitalism causes racism","An economic theory about race","A Marxist concept"],"e":"Cedric Robinson argued that racial hierarchy is not incidental to capitalism but foundational to it."},{"t":"What is reparations and the primary argument for it?","o":["Compensation for historical injustices like slavery and redlining on the grounds that their effects persist today","Paying people for being a minority","A form of reverse discrimination","A charitable donation"],"e":"Reparations arguments focus on the documented ongoing economic effects of deliberate historical policies."},{"t":"What is the democratic paradox of anti-discrimination law?","o":["Laws designed to end discrimination often require proof of individual intent making structural discrimination legally invisible","Laws are always effective","Discrimination is illegal everywhere","Anti-discrimination law is too strict"],"e":"Legal frameworks built around individual intent struggle to address structural and systemic racism."},{"t":"What is the argument that anti-racist work requires structural not just individual change?","o":["Because racist policies produce racist outcomes regardless of individual intent and only anti-racist policies can change those outcomes","Because individuals do not matter","Because education never works","Because racism is only structural"],"e":"Ibram X. Kendi argues that racist policies produce racist outcomes regardless of individual intent."},{"t":"What is algorithmic bias in the context of racial inequality?","o":["AI systems trained on biased historical data perpetuate and amplify racial inequalities in areas from hiring to criminal justice","Technology is always neutral","Algorithms cannot be racist","Only humans discriminate"],"e":"Algorithmic bias is a documented form of structural racism that operates through supposedly neutral technology."}],"t5":[{"t":"How does racial hierarchy get reproduced without conscious racist intent?","o":["Through institutional practices cultural norms and unconscious associations that encode past racism into present systems","It cannot be reproduced without intent","Only through deliberate actions","Through education alone"],"e":"Systems encode past racism into present structures meaning discrimination can persist without anyone choosing it."},{"t":"What is the critical race theory argument about the permanence of racism?","o":["Racism is a permanent feature of society because it serves material interests of the dominant group","That racism will never end","That nothing can be done about racism","That all white people are racist"],"e":"Derrick Bell argued racism is not an aberration but serves structural functions making it resistant to reform."},{"t":"How does whiteness as property operate in legal scholarship?","o":["Whiteness has historically conferred legal rights and privileges functioning as a form of property","White people own property","A literal legal category","A metaphor with no practical meaning"],"e":"Cheryl Harris argued that whiteness functions like property conferring real legal and economic benefits."},{"t":"How does racialised surveillance operate in public and private spaces?","o":["People of colour face disproportionate monitoring in stores neighbourhoods and online criminalising ordinary behaviour","Surveillance is always neutral","Technology is colourblind","Monitoring is based only on behaviour"],"e":"Racialised surveillance extends from individual calls to police about ordinary behaviour to algorithmic systems that replicate racial bias."},{"t":"What is the relationship between mass incarceration and structural racism?","o":["Mass incarceration functions as a system of racial control that replaced earlier systems like Jim Crow by stripping citizenship rights","Crime explains incarceration rates fully","Incarceration is race-neutral","A controversial opinion with no evidence"],"e":"Michelle Alexander documents how mass incarceration perpetuates racial caste through ostensibly race-neutral laws."},{"t":"What is the significance of the Rodriguez v San Antonio case for racial educational inequality?","o":["The Supreme Court ruled that unequal school funding based on property taxes does not violate the Constitution enabling ongoing systemic educational inequality","A case about desegregation","A case that ended racism in schools","A case about teacher pay"],"e":"Rodriguez meant that vastly unequal school funding linked to race and wealth has continued legally for decades."},{"t":"What is the relationship between voter suppression and racial inequality?","o":["Policies like voter ID laws polling place closures and felon disenfranchisement disproportionately affect voters of colour using race-neutral language to produce racially unequal political participation","Voter laws are always neutral","Voter suppression ended with the Voting Rights Act","Voter access is equal across racial groups"],"e":"The Voting Rights Act has been significantly weakened and documented patterns of voter suppression continue to track racial lines."},{"t":"What is the argument for reparations as distinct from general anti-poverty policy?","o":["Reparations address specific documented harms to specific communities unlike general anti-poverty policy which does not acknowledge or compensate for deliberate historical theft","Reparations and anti-poverty policy are the same thing","General policy is always sufficient","Reparations are only symbolic"],"e":"Reparations scholars distinguish between general redistributive policy and targeted redress for specific documented injustices."}]},"sexism":{"t1":[{"t":"What is sexism?","o":["Prejudice or discrimination based on gender","Liking a particular sport","A fashion style","Being polite"],"e":"Sexism is prejudice or discrimination based on sex or gender."},{"t":"What is the gender pay gap?","o":["Women earning less than men on average for work of equal value","A gap in education","A difference in hours worked","A natural difference"],"e":"The gender pay gap is documented across industries and countries."},{"t":"What is a gender stereotype?","o":["An oversimplified belief about how people of a certain gender should think or behave","A fact about gender","A scientific finding","A helpful generalisation"],"e":"Gender stereotypes limit all people regardless of their actual abilities or interests."},{"t":"What is benevolent sexism?","o":["Seemingly positive attitudes toward women that still reinforce traditional gender roles","Being kind to women","A mild form of sexism","Giving compliments"],"e":"Benevolent sexism sounds nice but reinforces harmful stereotypes."},{"t":"What is the glass ceiling?","o":["An invisible barrier that prevents women from reaching top leadership positions","A type of ceiling material","A workplace policy","A legal protection"],"e":"The glass ceiling describes structural barriers to women in leadership."},{"t":"What is mansplaining?","o":["When a man explains something to a woman condescendingly assuming she does not know it","Being helpful","Giving a good explanation","Teaching someone something new"],"e":"Mansplaining reflects an assumption that women need men to explain things to them."},{"t":"What is sexual harassment?","o":["Unwelcome behaviour of a sexual nature that creates a hostile environment","Being friendly","A compliment","A legal misunderstanding"],"e":"Sexual harassment is a form of sex discrimination that violates civil rights law."},{"t":"What does misogyny mean?","o":["Hatred or prejudice against women","Disliking a particular woman","Being old-fashioned","A legal term"],"e":"Misogyny is deep-seated prejudice against women as a group."}],"t2":[{"t":"What is the maternal wall bias?","o":["Assuming mothers are less committed to their careers than fathers or childless women","A physical barrier","A workplace policy","A legal protection for mothers"],"e":"The maternal wall causes mothers to face discrimination that fathers do not."},{"t":"What is role congruity bias?","o":["Penalising women for displaying leadership traits because those traits violate gender role expectations","A preference for certain roles","A type of performance review","Men being better at leadership"],"e":"Role congruity bias means the same confident behaviour praised in a man is labelled bossy in a woman."},{"t":"What is the second shift?","o":["The unpaid domestic labour women disproportionately perform after their paid working day","Working a second job","A factory shift","Overtime pay"],"e":"Arlie Hochschild documented that women do significantly more unpaid domestic labour than men."},{"t":"What is occupational segregation?","o":["The concentration of certain groups in certain jobs or sectors reflecting historical discrimination","Job specialisation","Career preference","A natural division of labour"],"e":"Occupational segregation often reflects and reinforces inequality — female-dominated sectors tend to be lower paid."},{"t":"What is the likability penalty for women who negotiate salary?","o":["Women who negotiate are often seen as aggressive while men who negotiate the same way are seen as assertive","A negotiation technique","A personality issue","A salary cap"],"e":"Research shows women face a social penalty for the very behaviour that advances men's careers."},{"t":"Why do women remain underrepresented in STEM despite equal academic performance?","o":["Due to cultural bias stereotype threat and hostile workplace climates not differences in ability","Because women prefer other fields naturally","Because men are better at maths","Because of different brain structures"],"e":"Research shows stereotype threat and hostile environments not ability differences explain STEM gender gaps."},{"t":"What is intersectional feminism?","o":["Feminism that recognises women's experiences are shaped by overlapping identities including race class and sexuality","Feminism that includes everyone","A type of activism","A political party"],"e":"Intersectional feminism recognises that a Black woman's experience of sexism is distinct from a white woman's."},{"t":"What is the confidence gap and how does it relate to gender?","o":["Research finding that women are socialised to underestimate their abilities while men overestimate theirs affecting career outcomes","Women are less confident by nature","A gap in salary","A personality difference"],"e":"The confidence gap is a result of socialisation not innate ability."}],"t3":[{"t":"What is structural sexism distinct from individual sexism?","o":["Systems and norms that produce gender inequality regardless of individual intent","When most individuals are sexist","A legal category","Only in some countries"],"e":"Structural sexism operates through policies and norms that disadvantage women systematically."},{"t":"How does implicit bias affect hiring for female candidates?","o":["Studies show identical CVs are rated higher when a male name is on them demonstrating bias disadvantages women even with equal qualifications","Hiring is always fair","Bias only affects explicit decisions","Women are hired at equal rates"],"e":"The Yale double-blind study showed science faculty rated male applicants as more competent than identical female applicants."},{"t":"What is hegemonic masculinity?","o":["The dominant form of masculinity that positions itself as normal and superior to other forms","All masculinity","A biological trait","A positive description of men"],"e":"Hegemonic masculinity harms not only women but also men who do not conform to its expectations."},{"t":"What is the pink tax?","o":["The higher prices charged for products marketed to women compared to nearly identical products marketed to men","A government tax on women","A type of discrimination","A marketing strategy"],"e":"The pink tax is a form of price discrimination based on gender."},{"t":"What is the feminisation of poverty?","o":["Women's disproportionate representation among the global poor due to gendered economic disadvantages","Women being poor by choice","A description of women's spending","A temporary trend"],"e":"Women face higher poverty rates globally due to wage gaps unpaid care work and less access to capital."},{"t":"How does gender bias operate in medical research and treatment?","o":["Medical research has historically used male subjects as the default meaning treatments may fail women","Medicine is completely gender-neutral","Bias only affects mental health treatment","Female patients get better care"],"e":"The exclusion of women from clinical trials until the 1990s has had lasting effects on the accuracy of medical care for women."},{"t":"What is the relationship between gender norms and mental health?","o":["Rigid gender norms harm mental health for both women who suppress anger and men who suppress vulnerability","Gender norms have no effect on mental health","Only toxic masculinity affects men","Only sexism affects women"],"e":"Research shows that rigid gender expectations contribute to higher rates of depression in women and higher rates of suicide in men."},{"t":"What is reproductive justice distinct from pro-choice advocacy?","o":["A framework addressing the right not only to have or not have children but also to parent in safe conditions centring women of colour","Being pro-choice","A political party position","The same as feminism"],"e":"Reproductive justice was developed by women of colour to address how race class and gender intersect in reproductive experiences."}],"t4":[{"t":"What is epistemic injustice in the context of gender?","o":["Women's testimony and knowledge are systematically dismissed because of their gender affecting everything from medical diagnosis to legal cases","A philosophical concept only","A rare occurrence","A legal term"],"e":"Miranda Fricker's concept of testimonial injustice describes how gender affects whose accounts are believed."},{"t":"Why did equal pay legislation fail to close the gender pay gap?","o":["Because the gap is driven not just by unequal pay for the same job but by occupational segregation career interruptions and devaluation of female-dominated work","Because the legislation was poorly written","Because women choose lower-paying jobs freely","Because the gap does not really exist"],"e":"Equal pay law addresses one dimension while structural causes of the pay gap remain largely unaddressed."},{"t":"What is the argument that gender is a social construction?","o":["That most of what we associate with being male or female is produced by culture and social expectations not determined by biology","That gender does not exist","That biology is irrelevant","A political claim"],"e":"Scholars like Judith Butler argue that gender is performed and produced through repeated social acts."},{"t":"What is the significance of emotional labour in understanding gender inequality?","o":["Women disproportionately perform the unrecognised unpaid work of managing others emotions at home and at work contributing to gender inequality","Emotional labour is equally shared","It is only relevant in care professions","A concept purely for commercial workers"],"e":"Arlie Hochschild's concept of emotional labour reveals a form of gendered work that goes largely unrecognised and uncompensated."},{"t":"What is the political economy of care work?","o":["Care work including childcare and domestic labour is systematically devalued and feminised producing gender inequality that is economic not just cultural","Care work is properly valued","Care work is unrelated to gender inequality","This is only relevant in developing countries"],"e":"The devaluation of care work is both a cause and consequence of gender inequality with profound economic effects."},{"t":"What is the relationship between parental leave policy and gender inequality?","o":["Policies that offer generous maternity leave but little paternity leave signal that childcare is women's work reinforcing the maternal penalty","Parental leave is always gender-neutral","Maternity leave is a simple employee benefit","Fathers do not need or want parental leave"],"e":"Countries and companies with equal parental leave see smaller gender pay gaps demonstrating the policy connection."},{"t":"How does gender bias operate in performance reviews?","o":["Women are more likely to receive feedback about their personality while men receive feedback about their skills creating a structural disadvantage","Performance reviews are always objective","Bias only affects hiring not reviews","Reviews are based entirely on output"],"e":"Research shows women and men receive systematically different types of feedback that compound career disadvantages over time."},{"t":"What is the intersectional workplace experience of Black women specifically?","o":["Black women face both racial and gender discrimination that compounds uniquely — they are paid significantly less and face specific stereotypes not covered by race or gender analysis alone","Black women face only racial discrimination at work","Workplace discrimination is the same for all women","Race and gender discrimination are always separate"],"e":"Research documents that Black women face a compound disadvantage that is not simply the addition of race and gender bias."}],"t5":[{"t":"What is the feminist argument that the personal is political?","o":["Private experiences of gender inequality like domestic violence are produced by public political structures and require political solutions","Politics should not be personal","A slogan with no analytical content","All personal choices are political acts"],"e":"Carol Hanisch's formulation challenged the idea that gender inequality in private life is simply personal and not political."},{"t":"How does compulsory heterosexuality relate to sexism?","o":["Adrienne Rich argued that heterosexuality is imposed on women as an institution that serves male interests limiting women's choices and autonomy","Heterosexuality is natural","A concept only relevant to LGBTQ+ issues","A fringe theory"],"e":"Rich's analysis connects the enforcement of heterosexuality to the broader system of male dominance over women."},{"t":"What is the relationship between colonialism and sexism?","o":["Colonial systems imposed new forms of gender hierarchy on colonised peoples while exploiting local gender norms producing forms of sexism that intersect with race and class","Colonialism had nothing to do with gender","Colonialism improved gender equality","They are completely separate systems"],"e":"Scholars of postcolonial feminism document how colonialism reshaped gender relations in complex ways that cannot be separated from race and economic exploitation."},{"t":"Why do scholars argue that gender-neutral policies often reproduce gender inequality?","o":["Because they treat historical disadvantage as a level playing field failing to account for structural advantages men have accumulated so neutrality preserves existing hierarchy","Because gender-neutral policies are unfair to men","Because women need special treatment","Because all policies should be gender-specific"],"e":"Formal equality that ignores substantive inequality can entrench rather than challenge existing power imbalances."},{"t":"How does algorithmic bias in hiring tools reproduce sexism?","o":["AI systems trained on historical hiring data that reflected male dominance learn to penalise female indicators like women's colleges or maternity leave career gaps","AI is always neutral","Algorithms cannot be sexist","Only humans can discriminate"],"e":"Amazon scrapped its AI hiring tool after finding it systematically downgraded applications from women."},{"t":"What is the argument that gender equality requires transforming masculinity?","o":["Because as long as caregiving and emotional work are devalued as feminine expanding women's access to masculine-coded spaces does not challenge the underlying hierarchy","Because men need to change more than women","Because women's issues are secondary","Because gender equality is only about women"],"e":"Scholars argue that true gender equality requires changing what masculinity means not just letting women participate in male-defined institutions."},{"t":"What is the relationship between domestic violence and gender inequality?","o":["Domestic violence is both a product and a driver of gender inequality — it is enabled by economic dependence normalised by gender norms and sustained by inadequate legal and social responses","Domestic violence is unrelated to gender inequality","It is a private family matter","Only extreme violence constitutes gender-based violence"],"e":"Research consistently shows domestic violence disproportionately affects women and is deeply linked to gender power dynamics."},{"t":"What is the crisis of masculinity debate and how does it relate to gender equality?","o":["Some argue changing gender roles create a crisis for men but critics note this framing often obscures continuing male advantage and is used to resist gender equality","Men are genuinely disadvantaged by feminism","Gender equality harms men","A sociological theory with no political implications"],"e":"While changing gender norms create real challenges for some men the crisis of masculinity framing is often used to delegitimise feminist progress."}]},"ableism":{"t1":[{"t":"What is ableism?","o":["Discrimination against people with disabilities","Being careful around disabled people","A medical term","A form of racism"],"e":"Ableism is prejudice or discrimination against people with disabilities."},{"t":"Is a person in a wheelchair automatically unable to work?","o":["No wheelchair users can do many jobs including leadership roles","Yes they need full-time care","Only if they have other disabilities","It depends on the wheelchair"],"e":"Disability does not determine ability. Many wheelchair users work in demanding careers."},{"t":"What does it mean to assume a disabled person cannot do something without asking?","o":["It is ableist — it assumes limitation based on disability not actual ability","It is being cautious","It is helpful","It is realistic"],"e":"Assuming limitation without evidence is a core form of ableism."},{"t":"What are reasonable accommodations?","o":["Adjustments that allow disabled people to participate fully without causing undue hardship","Special privileges","Medical treatment","Optional extras"],"e":"Reasonable accommodations are a legal right in many countries including the US."},{"t":"What is inspiration porn?","o":["Using images of disabled people to inspire non-disabled people reducing disabled people to objects of pity","A type of media","A compliment","Being motivated by disabled people"],"e":"Stella Young coined the term to describe how disabled people are objectified for non-disabled people's inspiration."},{"t":"Is it okay to speak to a disabled person's companion instead of the person themselves?","o":["No speak directly to the disabled person","Yes if the disability looks severe","Only if they cannot speak","Yes if the companion knows them better"],"e":"Speaking to companions instead of disabled people is a common form of ableism that denies autonomy."},{"t":"What does it mean for a space to be accessible?","o":["It can be used by people with a range of disabilities","It has a ramp only","It is very easy to enter","It is near public transport"],"e":"Accessibility means designing spaces and systems that work for people with a range of disabilities."},{"t":"What is ableist language?","o":["Using disability-related words as insults such as calling something lame or crazy","Using medical terminology","Talking about disability","Describing symptoms"],"e":"Ableist language uses disability as a negative descriptor reinforcing stigma."}],"t2":[{"t":"What is the social model of disability?","o":["The view that disability is caused by barriers in society not by individual impairments","The medical view of disability","A legal framework","A theory about social skills"],"e":"The social model shifts focus from fixing the person to removing societal barriers."},{"t":"What is neurodiversity?","o":["The idea that neurological differences like autism and ADHD are natural human variation not deficits to be fixed","A medical diagnosis","A disability category","A type of therapy"],"e":"The neurodiversity movement challenges the pathologisation of neurological difference."},{"t":"What is diagnostic overshadowing?","o":["When a disability becomes a catch-all explanation that prevents proper diagnosis of other conditions","A type of misdiagnosis","A helpful clinical technique","A lighting problem"],"e":"Diagnostic overshadowing leads doctors to attribute symptoms to disability rather than investigating properly."},{"t":"What does nothing about us without us mean?","o":["Disabled people must be included in decisions and policies that affect them","A protest slogan","A legal requirement only","A social media campaign"],"e":"Nothing about us without us demands that disabled people have meaningful participation in decisions affecting their lives."},{"t":"What is autism masking?","o":["When autistic people suppress or hide their natural behaviours to appear neurotypical at significant cost to their wellbeing","Acting in a play","A coping strategy that is always helpful","Pretending to be disabled"],"e":"Autism masking is associated with burnout anxiety and delayed diagnosis especially in women and girls."},{"t":"What is cure ideology?","o":["The belief that disability should always be cured or eliminated which many disabled people reject as denying the value of their lives","The medical approach to disability","A helpful medical goal","Always what disabled people want"],"e":"Many Deaf and autistic people in particular reject cure ideology and embrace their identity and community."},{"t":"What is the relationship between ableism and poverty?","o":["Ableism produces poverty by excluding disabled people from employment education and wealth-building opportunities","They are unrelated","Disability causes poverty through reduced ability","Poverty is the main cause of disability"],"e":"Ableism and poverty are mutually reinforcing."},{"t":"What is the difference between disability and impairment?","o":["Impairment is a physical or mental difference; disability is the disadvantage created by social barriers","They are the same thing","Impairment is worse than disability","Disability is medical; impairment is social"],"e":"The social model makes this distinction to shift focus from the body to the environment."}],"t3":[{"t":"What is structural ableism?","o":["Systems and environments designed around non-disabled people that exclude disabled people even without individual intent","When most people are ableist","A type of legal discrimination","Only physical barriers"],"e":"Structural ableism is built into architecture technology employment systems and communication by defaulting to non-disabled norms."},{"t":"How does the education system reflect ableism?","o":["By designing curricula environments and assessment around neurotypical non-disabled students and treating disabled students as exceptions requiring fixes","The education system is fully inclusive","Disability accommodations in schools are generous","Only physical inaccessibility is a problem"],"e":"Disabled students are often segregated underfunded and pushed toward lower expectations reflecting ableist assumptions."},{"t":"What is crip theory?","o":["A theoretical framework that challenges the normalisation of non-disabled bodies and minds arguing disability is a site of knowledge and resistance","A type of disability activism only","A medical approach","An academic concept with no practical relevance"],"e":"Crip theory builds on queer theory to challenge the idea that non-disabled is the normal and desirable state."},{"t":"What is the accessibility paradox in digital technology?","o":["Technology that could make the world far more accessible for disabled people is often designed without disability in mind making digital exclusion a growing form of ableism","Technology is always accessible","Accessibility features are always included","Disabled people prefer non-digital tools"],"e":"Digital inaccessibility excludes disabled people from employment healthcare civic participation and social connection."},{"t":"What is the relationship between ableism and mental health stigma?","o":["Mental health stigma is a specific form of ableism that treats mental illness as shameful while physical disabilities are sometimes treated with more sympathy","They are completely separate issues","Mental health stigma is not related to disability","Mental illness is not a disability"],"e":"The stigma around mental illness reflects ableist hierarchies that value some impairments as more legitimate than others."},{"t":"How does ableism operate in hiring?","o":["Through assumptions that disabled applicants are less capable reluctance to provide accommodations and application processes that create barriers","Hiring is fully fair for disabled applicants","Only physical disabilities affect hiring","Disabled people are now over-hired"],"e":"Disabled people face unemployment rates roughly twice those of non-disabled people largely due to employer bias and structural barriers."},{"t":"What is the critique of inspiration porn from a disability justice perspective?","o":["Inspiration porn objectifies disabled people for non-disabled consumption reinforces the idea that disability is tragic and denies disabled people's full humanity","Inspiration porn is always harmful to everyone","It is a form of representation that helps disabled people","It is a neutral description of media"],"e":"Disability justice scholars argue that inspiration porn reflects ableist pity rather than genuine respect for disabled people's lives."},{"t":"What is the relationship between ableism and colonialism?","o":["Colonialism introduced medical models of disability to colonised peoples pathologised Indigenous practices and created disability through violence and exploitation","Colonialism had nothing to do with disability","Ableism only exists in Western societies","Colonialism improved disability rights"],"e":"Disability scholars document how colonialism shaped both the production of disability and the systems used to manage and control disabled people."}],"t4":[{"t":"What is the argument that disability is a political identity not just a medical category?","o":["Because what counts as a disability is shaped by social and political choices about which differences are accommodated and which are treated as deficits","Because all medical categories are political","Because disability is always chosen","Because medicine is inherently biased"],"e":"The same impairment can be disabling in one environment and not in another demonstrating that disability is shaped by politics and design not just biology."},{"t":"What is the relationship between ableism and the eugenics movement?","o":["Eugenics explicitly sought to eliminate disability from the population and ableist ideas about disability as undesirable continue to influence policy and culture","Eugenics had nothing to do with disability","Eugenics was only about race","Eugenics ended completely after World War Two"],"e":"The eugenics movement targeted disabled people as burdens on society and its legacy continues in contemporary attitudes and policies."},{"t":"How does language shape ableism?","o":["Language that uses disability as metaphor or as synonymous with tragedy encodes ableist assumptions into everyday communication normalising devaluation of disabled people","Language is always neutral","Ableist language is only a minor issue","Disabled people should not be sensitive about language"],"e":"Language both reflects and reproduces social attitudes. Ableist language normalises hierarchies in which disabled lives are seen as lesser."},{"t":"What is the argument that normal is a political concept not a neutral description?","o":["What counts as normal is determined by which bodies and minds are centred in social design and whose differences are treated as deficits making normalcy a tool of power","Normal is a statistical average","Normalcy is medically determined","The concept of normal is helpful and neutral"],"e":"Rosemarie Garland-Thomson and others argue that normalcy is constructed to mark certain people as deviant and exclude them."},{"t":"How does selective attention to visible disability reproduce ableism?","o":["Focusing only on visible and physical disability erases non-visible disabilities including chronic illness mental health conditions and neurodivergence from policy design and representation","Non-visible disability is not real disability","Visible disability is always worse","Physical disability deserves more attention"],"e":"The majority of disabilities are non-visible meaning that designing for wheelchair accessibility alone leaves most disabled people's needs unaddressed."},{"t":"What is the ethics of care in the context of disability?","o":["A philosophical framework that challenges the ideal of the independent autonomous individual by centring interdependence vulnerability and care as fundamental to human life","A medical ethics concept","A framework that denies disabled people independence","Only relevant to care workers"],"e":"The ethics of care developed by scholars like Eva Feder Kittay challenges the ableist assumption that independence is the ideal while dependence is a problem."},{"t":"What is selective abortion in the context of disability ethics?","o":["The termination of pregnancies following a diagnosis of disability raises complex questions about reproductive rights disability rights and whether disabled lives are less valued","Always wrong","Always acceptable","A simple medical decision"],"e":"Disability scholars argue that widespread selective abortion of foetuses with conditions like Down syndrome reflects ableist devaluation of disabled lives."},{"t":"What is the welfare system critique from a disability justice perspective?","o":["Disability benefit systems often treat disabled people as dependent burdens impose humiliating means-testing and structure benefits to discourage work rather than support participation","Welfare is always supportive","The welfare system was designed with disability in mind","Ableism is not present in government systems"],"e":"Disability benefit systems often reflect ableist assumptions about capacity and worth rather than genuine support for participation."}],"t5":[{"t":"What is disability justice distinct from disability rights?","o":["Disability justice is an intersectional framework developed by disabled activists of colour that centres those most marginalised and addresses the connections between ableism racism capitalism and other systems of oppression","Disability justice is a newer term for disability rights","Disability rights is more radical","They are the same movement"],"e":"Sins Invalid developed the disability justice framework to address the limitations of a disability rights movement that often centred white physically disabled people."},{"t":"How does the prison industrial complex relate to ableism?","o":["Prisons disproportionately incarcerate disabled people especially those with mental illness while failing to provide treatment reflecting how ableism and criminalisation intersect","Prisons are accessible and inclusive","Disabled people are protected from incarceration","Ableism only affects employment not criminal justice"],"e":"Estimates suggest half or more of people killed by police have a disability reflecting the deadly intersection of ableism and over-policing."},{"t":"What is the argument that universal design benefits everyone not just disabled people?","o":["Features designed for accessibility like kerb cuts captions and voice control are used by and benefit a much wider population demonstrating that inclusive design serves everyone","Universal design only benefits disabled people","Accessibility features are expensive and rarely used","Universal design is a nice idea but impractical"],"e":"The curb cut effect shows how features designed for wheelchair users benefit cyclists parents with prams and delivery workers demonstrating that accessibility is good design."},{"t":"How does compulsory able-bodiedness operate?","o":["Robert McRuer argues that society demands that people aspire to and perform non-disability while marginalising those who cannot or will not — just as heterosexuality is compulsory so is able-bodiedness","Able-bodiedness is a medical standard only","A fringe academic theory","Only relevant in medical contexts"],"e":"Compulsory able-bodiedness means that disabled people are expected to strive toward normality rather than having their difference respected as valid."},{"t":"What is the relationship between late capitalism and the production of disability?","o":["Capitalist systems that define human worth through productivity create ableism by treating those who cannot maximise economic output as burdens while also producing disability through dangerous working conditions","Capitalism is disability-neutral","Disability is unrelated to economic systems","Disabled people simply cannot work"],"e":"Disability scholars argue that the very definition of disability is shaped by what bodies capitalism requires and discards."},{"t":"What is the epistemology of disability?","o":["The study of how disability produces distinctive forms of knowledge and how ableism shapes what counts as knowledge expertise and credible testimony","A medical research field","A type of disability education","A philosophical concept with no practical implications"],"e":"Disabled people's expertise about their own conditions and experiences is systematically dismissed — a form of epistemic injustice."},{"t":"What is the relationship between neoliberalism and disability policy?","o":["Neoliberal governance transfers responsibility for disability from collective social provision to individuals and markets producing inadequate support while framing the resulting poverty as individual failure","Neoliberalism improves disability support","Market solutions always work better for disabled people","Neoliberalism is politically neutral regarding disability"],"e":"The shift from collective to individual responsibility under neoliberalism has particular consequences for disabled people who depend on collective provision."},{"t":"What is the disability paradox in quality of life research?","o":["Non-disabled people consistently rate the quality of life of disabled people as much lower than disabled people rate their own quality of life — this reveals how ableist assumptions about what makes life worth living are projected onto disabled people","Disabled people always have lower quality of life","Non-disabled estimates of disabled quality of life are accurate","Quality of life is a purely objective measure"],"e":"The disability paradox challenges the assumption that disability is inherently tragic and reveals how quality of life is shaped by social inclusion not just functional capacity."}]},"workplace":{"t1":[{"t":"What is workplace discrimination?","o":["Treating an employee unfairly because of a protected characteristic like race gender or disability","Being strict at work","Having high standards","Firing someone for poor performance"],"e":"Workplace discrimination based on protected characteristics is illegal in many countries."},{"t":"What is a hostile work environment?","o":["A workplace where harassment or discrimination makes it difficult to do your job","A strict manager","A busy office","A competitive workplace"],"e":"A hostile work environment is a legal concept relating to workplace harassment."},{"t":"Is it legal to ask a job applicant their age in most countries?","o":["No it is considered discriminatory in most contexts","Yes it is standard practice","Only for physical jobs","Only if the applicant looks young"],"e":"Asking age in job interviews is generally prohibited as it could enable age discrimination."},{"t":"What is a microaggression in a workplace context?","o":["A subtle comment or action that communicates bias often unintentionally which accumulates over time","A small conflict at work","A minor complaint","An honest mistake"],"e":"Workplace microaggressions have documented negative effects on productivity and wellbeing."},{"t":"What is unconscious bias in hiring?","o":["Automatic preferences that influence hiring decisions without the interviewer being aware","Deliberate discrimination","Having favourites","Being unfair on purpose"],"e":"Unconscious bias in hiring can systematically disadvantage candidates from certain groups."},{"t":"What is nepotism?","o":["Favouring relatives or friends in hiring or promotion regardless of merit","Networking","Building team loyalty","A management style"],"e":"Nepotism undermines meritocracy and can constitute a form of workplace discrimination."},{"t":"What does a safe workspace mean?","o":["An environment where all employees can work without fear of harassment discrimination or retaliation","A physically safe building","A workplace with no conflict ever","A very relaxed office"],"e":"A safe workspace requires both physical safety and freedom from harassment and discrimination."},{"t":"What is retaliation in the context of workplace discrimination?","o":["Punishing an employee for reporting discrimination or harassment","A performance management tool","A conflict resolution strategy","Firing someone for poor performance"],"e":"Retaliation against those who report discrimination is itself illegal in most jurisdictions."}],"t2":[{"t":"What is the glass cliff?","o":["The tendency to appoint women and minorities to leadership roles during organisational crises setting them up for failure","The glass ceiling","A type of architecture","A promotion policy"],"e":"The glass cliff puts already marginalised leaders in precarious positions that are harder to succeed in."},{"t":"What is the prove-it-again bias?","o":["The tendency to demand more evidence of competence from women and minorities than from white men with equivalent qualifications","Thorough hiring","Being fair","High standards"],"e":"Prove-it-again bias means marginalised employees must repeatedly re-establish their competence."},{"t":"What is code-switching in a workplace context?","o":["When employees from marginalised groups adjust their speech appearance and behaviour to conform to dominant cultural norms at significant psychological cost","Learning different programming languages","Being adaptable","A communication skill"],"e":"Code-switching is an exhausting survival strategy that should not be necessary."},{"t":"What is the double bind for women in leadership?","o":["Women who act like typical leaders are seen as aggressive; women who act femininely are seen as not leadership material — neither works","A management challenge","A negotiation tactic","A career development issue"],"e":"The double bind reflects how gender stereotypes make it impossible for women to meet conflicting expectations simultaneously."},{"t":"What is occupational segregation?","o":["The concentration of certain groups in certain jobs or sectors often reflecting historical discrimination rather than choice or merit","Job specialisation","Career preference","A natural division of labour"],"e":"Occupational segregation often reflects and reinforces inequality — female-dominated sectors tend to be lower paid."},{"t":"What is diversity washing or diversity theatre?","o":["When organisations perform commitment to diversity through surface-level gestures without making structural changes","Genuine diversity work","A communication strategy","A legal requirement"],"e":"Diversity washing allows organisations to claim credit for inclusion without doing the harder work of structural change."},{"t":"What is the difference between mentoring and sponsoring?","o":["Mentors give advice; sponsors actively use their influence to open doors and advocate for advancement — sponsorship is more powerful","They are the same","Mentoring is more valuable","Sponsorship is a form of nepotism"],"e":"Research shows that sponsorship — using influence to advocate — is what actually drives career advancement."},{"t":"What is the glass escalator for men in female-dominated professions?","o":["Men in female-dominated professions like nursing are often promoted faster than women in those same fields demonstrating gender bias even in traditionally female roles","Men struggle in female-dominated professions","The glass escalator only applies to some men","It is a myth that men are promoted faster"],"e":"The glass escalator coined by Christine Williams shows that gender privilege operates even in female-dominated spaces."}],"t3":[{"t":"How does affinity bias shape workplace culture over time?","o":["Leaders hire and promote people similar to themselves creating homogeneous teams that perpetuate the exclusion of those who are different","Affinity bias is harmless","Homogeneous teams perform better","Similarity is a good basis for hiring"],"e":"Affinity bias compounds over career hierarchies meaning those at the top look like those who hired them."},{"t":"What is psychological safety in the context of inclusion?","o":["The belief that one can speak up ask questions or make mistakes without fear of punishment or ridicule — essential for real inclusion","Physical safety at work","Being comfortable at all times","Never having conflict"],"e":"Amy Edmondson's research shows psychological safety is the foundation of high-performing and truly inclusive teams."},{"t":"What is the impact of diversity in teams on organisational performance?","o":["Research consistently shows diverse teams make better decisions and are more innovative but only when inclusion exists — diversity without inclusion produces conflict not performance","Diverse teams always outperform","Homogeneous teams are more efficient","Diversity has no effect on performance"],"e":"McKinsey and others document that diverse and inclusive organisations financially outperform less diverse peers."},{"t":"What is structural bias in performance reviews?","o":["Women and minorities receive vague or personality-based feedback while white men receive specific actionable feedback creating a structural disadvantage","Performance reviews are always objective","Bias only affects hiring not reviews","Reviews are based entirely on output"],"e":"Research shows women are more likely to receive feedback about their personality while men receive feedback about their skills and results."},{"t":"What is the precarious worker problem in relation to workplace equality?","o":["Marginalised groups including women people of colour and disabled people are disproportionately concentrated in precarious or contract work with fewer protections","All workers face the same precarity","Precarious work is a choice","Gig work has no relation to discrimination"],"e":"Labour market inequalities track identity inequalities meaning precarity and discrimination are structurally linked."},{"t":"How does parental leave policy reflect and reproduce workplace gender inequality?","o":["Policies that offer generous maternity leave but little paternity leave signal that childcare is women's work reinforcing the maternal penalty","Parental leave is always gender-neutral","Maternity leave is a simple employee benefit","Fathers do not need or want parental leave"],"e":"Countries and companies with equal parental leave see smaller gender pay gaps demonstrating the policy connection."},{"t":"What is the intersectional workplace experience of Black women specifically?","o":["Black women face both racial and gender discrimination that compounds uniquely — they are paid significantly less and face specific stereotypes not covered by race or gender analysis alone","Black women face only racial discrimination at work","Workplace discrimination is the same for all women","Race and gender discrimination are always separate"],"e":"Research documents that Black women face a compound disadvantage that is not simply the addition of race and gender bias."},{"t":"What is the role of sponsorship versus mentorship in workplace inequality?","o":["Mentors give advice but sponsors actively use their influence to open doors — marginalised employees get mentored but not sponsored perpetuating inequality","Mentorship and sponsorship are the same thing","Mentoring is more valuable than sponsorship","Sponsorship is a form of nepotism"],"e":"Research by Sylvia Ann Hewlett shows that sponsorship — not just mentorship — is key to advancement and marginalised employees are sponsor-poor."}],"t4":[{"t":"Why are diversity initiatives alone insufficient to produce equitable workplaces?","o":["Because diversity initiatives address representation but not the power structures norms and practices that determine whose work is valued who is promoted and who is heard","Because diversity initiatives always fail","Because diversity is impossible to achieve","Because the problem is individual not systemic"],"e":"Without changing evaluation criteria meeting cultures sponsorship patterns and promotion practices diversity without inclusion produces attrition of marginalised employees."},{"t":"How does the evaluation of leadership potential reflect bias?","o":["Leadership potential is often evaluated against an implicit prototype — typically white male tall and confident — meaning people who deviate from this prototype are systematically underrated regardless of actual ability","Leadership assessment is always objective","Leadership potential is easy to measure","The prototype is based on data about effective leaders"],"e":"The leadership prototype is itself a product of historical exclusion rather than evidence about what good leadership actually looks like."},{"t":"What is the relationship between workplace culture and attrition of underrepresented employees?","o":["Hostile or non-inclusive cultures produce higher attrition among marginalised employees creating a revolving door that diversity hiring cannot fix without cultural change","Attrition is always about individual choice","Culture has no effect on attrition","Pay is the only factor that causes attrition"],"e":"McKinsey research shows underrepresented employees cite belonging and inclusion — not pay — as primary drivers of attrition."},{"t":"What is the argument against meritocracy as an explanation for workplace inequality?","o":["Research shows that meritocratic systems often produce more inequality not less because they create licence for bias by convincing people their judgments are objective when they are not","Meritocracy always produces fair outcomes","Workplace inequality is simply about merit","People who succeed deserve to succeed"],"e":"Emilio Castilla's research found that organisations that explicitly valorise meritocracy show more bias in pay decisions not less."},{"t":"How does organisational silence around discrimination perpetuate it?","o":["When reporting discrimination carries social or professional costs and organisations fail to act on reports silence is enforced and discrimination becomes a stable feature of the culture","Silence is always neutral","Reporting systems always work","Most discrimination is addressed when reported"],"e":"Research shows most workplace discrimination goes unreported because of fear of retaliation and disbelief."},{"t":"What is the relationship between implicit bias training effectiveness and structural change?","o":["Research shows that implicit bias training has little lasting effect on behaviour unless accompanied by structural changes to hiring evaluation and promotion systems","Implicit bias training always works","Training is sufficient to change bias","Structural factors are less important than individual attitudes"],"e":"Patricia Devine and
